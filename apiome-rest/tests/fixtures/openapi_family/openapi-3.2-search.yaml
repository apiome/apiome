openapi: 3.2.0
info:
  title: Search API
  version: "1.0.0"
tags:
  - name: pets
    summary: Pet ops
    parent: store
  - name: store
paths:
  /pets/search:
    query:
      operationId: searchPets
      tags:
        - pets
      responses:
        "200":
          description: results
  /pets:
    get:
      operationId: listPets
      tags:
        - pets
      responses:
        "200":
          description: ok
    additionalOperations:
      PURGE:
        operationId: purgePets
        responses:
          "204":
            description: purged
components:
  schemas:
    Pet:
      type: object
