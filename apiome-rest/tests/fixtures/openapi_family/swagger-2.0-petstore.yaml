swagger: "2.0"
info:
  title: Pet Store
  version: "1.0.0"
  description: Pets.
host: api.example.com
basePath: /v1
schemes:
  - https
consumes:
  - application/json
produces:
  - application/json
paths:
  /pets/{id}:
    get:
      operationId: getPet
      summary: Get a pet
      tags:
        - pets
      parameters:
        - name: id
          in: path
          required: true
          type: string
      responses:
        "200":
          description: ok
          schema:
            $ref: "#/definitions/Pet"
    post:
      operationId: createPet
      tags:
        - pets
      parameters:
        - name: body
          in: body
          required: true
          schema:
            $ref: "#/definitions/Pet"
      responses:
        "201":
          description: created
          schema:
            $ref: "#/definitions/Pet"
definitions:
  Pet:
    type: object
    required:
      - id
      - name
    properties:
      id:
        type: string
      name:
        type: string
