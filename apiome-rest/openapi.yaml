      description: 'The pre-flight verdict for one (source, target) conversion (MFX-3.3).


        Pairs the coarse :class:`TranscodeVerdict` band with the structured *why*
        — the source

        and target paradigms, how many operations/events the target cannot carry,
        and the

        report''s dropped / critical counts — plus ready-to-render :attr:`headline`
        / :attr:`message`

