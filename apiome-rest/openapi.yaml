        ``serverInfo`` (#4656).


        A recognizable-catalog aid (V2-MCP-34.2): the server''s website and a display
        icon, if any.

        Every field is optional and independently present — the capture layer

        (:mod:`app.mcp_client.branding`) drops any value that fails its guards (https-only,

        SSRF-safe host, length-bounded), so a field here is always a safe, *referenceable*
        URL. The

        whole object is ``None`` on a snapshot when the server advertised no usable
        branding, and the

        card falls back to its text form.'
    McpServerDigestGenerateResponse:
      properties:
        success:
          type: boolean
          title: Success
          default: true
        endpoint_id:
          type: string
          title: Endpoint Id
        version_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Version Id
        surface_fingerprint:
          anyOf:
          - type: string
          - type: 'null'
          title: Surface Fingerprint
        ai_digest_enabled:
          type: boolean
          title: Ai Digest Enabled
          default: false
        ai_generated:
          type: boolean
          title: Ai Generated
          default: true
        digest:
          anyOf:
          - type: string
          - type: 'null'
          title: Digest
        model:
          anyOf:
          - type: string
          - type: 'null'
          title: Model
        generated_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Generated At
        tool_count:
          type: integer
          title: Tool Count
          default: 0
        examples:
          items:
            $ref: '#/components/schemas/McpToolExampleOut'
          type: array
          title: Examples
        generated:
          type: boolean
          title: Generated
          default: false
        from_cache:
          type: boolean
          title: From Cache
          default: false
        detail:
          type: string
          title: Detail
          default: ''
      type: object
      required:
      - endpoint_id
      title: McpServerDigestGenerateResponse
      description: 'Response envelope for the gated digest generation step (MCAT-18.5).


        Extends :class:`McpServerDigestResponse` with the outcome of a ``POST …/insight/digest/generate``:

        ``generated`` is true only when the model actually produced (and cached) a
        digest on this call;

        ``from_cache`` is true when an already-cached digest for the current surface
        was returned without

        calling the model. When the feature flag is off, no API key is configured,
        the surface has nothing to

        summarize, or the model call fails, ``generated`` is false and ``detail``
        explains why — always a

        ``200`` describing the no-op, never an error.'
    McpServerDigestResponse:
      properties:
        success:
          type: boolean
          title: Success
          default: true
        endpoint_id:
          type: string
          title: Endpoint Id
        version_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Version Id
        surface_fingerprint:
          anyOf:
          - type: string
          - type: 'null'
          title: Surface Fingerprint
        ai_digest_enabled:
          type: boolean
          title: Ai Digest Enabled
          default: false
        ai_generated:
          type: boolean
          title: Ai Generated
          default: true
        digest:
          anyOf:
          - type: string
          - type: 'null'
          title: Digest
        model:
          anyOf:
          - type: string
          - type: 'null'
          title: Model
        generated_at:
          anyOf:
          - type: string
          - type: 'null'
          title: Generated At
        tool_count:
          type: integer
          title: Tool Count
          default: 0
        examples:
          items:
            $ref: '#/components/schemas/McpToolExampleOut'
          type: array
          title: Examples
      type: object
      required:
      - endpoint_id
      title: McpServerDigestResponse
      description: 'Response envelope for an endpoint''s natural-language digest +
        usage examples (MCAT-18.5).


        Pairs an **AI-generated** plain-language summary of the server (``digest``
        — clearly labelled AI

        content, ``null`` until generated) with one **deterministic, schema-derived
        example call per tool**

        (``examples`` — always present, computed offline from the current surface,
        never requiring the model

        or tool execution). ``ai_digest_enabled`` reflects the ``APIOME_MCP_AI_DIGEST_ENABLED``
        feature flag

        so the UI knows whether a "generate" action is available. The digest is cached
        per

        ``surface_fingerprint`` and regenerated when the surface changes; ``model``
        / ``generated_at`` record

        the provenance of a cached digest. A never-discovered endpoint yields empty
        ``examples`` and a ``null``

        digest — a ``200``, never a ``500``.'
    McpSimilarEmbeddingNeighborOut:
      properties:
        endpoint_id:
          type: string
          title: Endpoint Id
        name:
          type: string
          title: Name
        slug:
          anyOf:
