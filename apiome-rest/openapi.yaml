    ProjectionEdge:
      properties:
        id:
          type: string
          title: Id
          description: Deterministic, stable edge id (unique within a manifest).
          example: res_01h2xcejqtf3fz5y5j0v8k9m2p
        relation:
          $ref: '#/components/schemas/ProjectionEdgeRelation'
          description: derives (provenance) or projects (outcome).
        source:
          type: string
          title: Source
          description: Id of the node this edge starts at.
          example: human
        target:
          anyOf:
          - type: string
            description: Projection Edge schema.
          - type: 'null'
            description: Projection Edge schema.
          title: Target
          description: Id of the node this edge ends at; null for a projects edge
            to a dropped construct (no target node exists).
        status:
          $ref: '#/components/schemas/ProjectionStatus'
          description: The projection outcome this edge records.
        reason:
          anyOf:
          - $ref: '#/components/schemas/ProjectionReason'
          - type: 'null'
            description: Projection Edge schema.
          description: Cause category for a non-preserved status; required for drop/approx/synth/unavailable.
        severity:
          $ref: '#/components/schemas/LossinessSeverity'
          description: How much the outcome matters (info / warn / critical), from
            the report.
          default: info
        detail:
          type: string
          title: Detail
          description: Human-readable explanation of the outcome.
          example: example
        target_mapping:
          anyOf:
          - type: string
            description: Projection Edge schema.
          - type: 'null'
            description: Projection Edge schema.
          title: Target Mapping
          description: How the construct landed in the target when not dropped (from
            the report).
        explanation:
          anyOf:
          - type: string
            description: Projection Edge schema.
          - type: 'null'
            description: Projection Edge schema.
          title: Explanation
          description: Reviewed, reason-specific explanation from the capability registry
            (EFP-1.2), naming the construct. Present on non-preserved outcome edges.
        documentation:
          anyOf:
          - $ref: '#/components/schemas/DocumentationEvidence'
          - type: 'null'
            description: Projection Edge schema.
          description: 'Reason-scoped documentation evidence from the capability registry
            (EFP-1.2): a destination-format link only when the reason is a genuine
            destination limit, otherwise a truthful documentation-unavailable fallback.
            Present on non-preserved outcome edges.'
      additionalProperties: false
      type: object
      required:
      - id
      - relation
      - source
      - status
      - detail
      title: ProjectionEdge
      description: 'One edge in the projection graph.


        A ``derives`` edge links a native-evidence node to its canonical construct

        (provenance); a ``projects`` edge links a canonical construct to its target

        location (or to nothing, for a dropped construct) and carries the projection

        outcome — :attr:`status`, :attr:`reason`, :attr:`severity`, and the human

        :attr:`detail`. Exactly one ``projects`` edge exists per

        :class:`~app.lossiness.LossItem`, which is what makes the manifest reconcile

        construct-for-construct with the report.'
    ProjectionEdgeRelation:
      type: string
      enum:
      - derives
      - projects
      title: ProjectionEdgeRelation
      description: The relationship a :class:`ProjectionEdge` expresses.
    ProjectionEvidencePage:
      properties:
        manifest_hash:
          type: string
          title: Manifest Hash
          description: The manifest hash this page belongs to (the snapshot id).
          example: a1b2c3d4e5f6789012345678901234ab
        edges:
          items:
            $ref: '#/components/schemas/ProjectionEdge'
          type: array
          title: Edges
          description: This page's outcome edges, in canonical order.
          maxItems: 1000
        nodes:
          items:
            $ref: '#/components/schemas/ProjectionNode'
          type: array
          title: Nodes
          description: The nodes referenced by this page's edges.
          maxItems: 1000
        next_cursor:
          anyOf:
          - type: string
            description: Projection Evidence Page schema.
          - type: 'null'
            description: Projection Evidence Page schema.
          title: Next Cursor
          description: Opaque cursor for the next page, or null when this is the last
            page.
        total:
          type: integer
          title: Total
          description: Total outcome edges across the whole manifest.
          example: 1
      additionalProperties: false
      type: object
      required:
      - manifest_hash
      - edges
      - nodes
      - total
      title: ProjectionEvidencePage
      description: 'One cursor-paginated page of projection evidence (EFP-1.1).


        A bounded slice of the manifest''s outcome (``projects``) edges together with
        the

        nodes those edges reference, plus an opaque :attr:`next_cursor` for the following

        page (``None`` at the end). Deterministic: the edges are page-sliced from
        the

        manifest''s canonical order, so paging the same manifest twice yields identical

        pages.'
    ProjectionManifestSummary:
      properties:
        manifest_hash:
          type: string
          title: Manifest Hash
          description: The manifest's stable content hash — the snapshot id.
          example: a1b2c3d4e5f6789012345678901234ab
        target:
          $ref: '#/components/schemas/ManifestTarget'
          description: The target + version provenance the manifest is for.
        status_counts:
          additionalProperties:
            type: integer
          type: object
          title: Status Counts
          description: Count of projected constructs per ProjectionStatus, zero-filled.
        reason_counts:
          additionalProperties:
            type: integer
          type: object
          title: Reason Counts
          description: Count of non-preserved constructs per ProjectionReason, zero-filled.
        total_constructs:
          type: integer
          title: Total Constructs
          description: Distinct canonical constructs the manifest projects.
          example: 1
        node_count:
          type: integer
          title: Node Count
          description: Total projection nodes in the full manifest.
          example: 1
        edge_count:
          type: integer
          title: Edge Count
          description: Total projection edges in the full manifest.
          example: 1
        evidence_count:
          type: integer
          title: Evidence Count
          description: Total outcome (projects) edges — the evidence rows.
          example: 1
        is_lossless:
          type: boolean
          title: Is Lossless
          description: True when every construct was retained.
          example: true
        worst_severity:
          anyOf:
          - $ref: '#/components/schemas/LossinessSeverity'
          - type: 'null'
            description: Projection Manifest schema.
          description: Worst severity among non-retained constructs, or null when
            lossless.
        truncated:
          type: boolean
          title: Truncated
          description: True when the underlying graph was aggregated rather than complete.
          default: false
          example: false
      additionalProperties: false
      type: object
      required:
      - manifest_hash
      - target
      - status_counts
      - reason_counts
      - total_constructs
      - node_count
      - edge_count
      - evidence_count
      - is_lossless
      title: ProjectionManifestSummary
      description: 'The bounded projection summary embedded in the fidelity envelope
        (EFP-1.1).


        Everything a preview/verify/CLI/job needs to *reference* a snapshot — the

        :attr:`manifest_hash`, the target/version provenance, and the aggregate

        status/reason counts — **without** the (potentially large) node/edge graph,
        which

        is fetched page by page via :func:`paginate_evidence`. Because the summary
        is

        derived from the deterministic manifest, the same inputs produce the same
        summary

        across every surface, so they all describe the same snapshot.'
    ProjectionNode:
      properties:
        id:
          type: string
          title: Id
          description: Deterministic, stable node id (unique within a manifest).
          example: res_01h2xcejqtf3fz5y5j0v8k9m2p
        kind:
          $ref: '#/components/schemas/ProjectionNodeKind'
          description: Which projection layer this node belongs to.
        label:
          type: string
          title: Label
          description: Short human label for the node (a construct key, name, or path).
          example: example
        construct_key:
          anyOf:
          - type: string
            description: Projection Node schema.
          - type: 'null'
            description: Projection Node schema.
          title: Construct Key
          description: The canonical construct key this node concerns (present on
            every node kind).
        canonical_kind:
          anyOf:
          - type: string
            description: Projection Node schema.
          - type: 'null'
            description: Projection Node schema.
          title: Canonical Kind
          description: 'Coarse construct class on a canonical node: operation / channel
            / type / field.'
        native:
          anyOf:
          - $ref: '#/components/schemas/NativeEvidence'
          - type: 'null'
            description: Projection Node schema.
          description: Source-native evidence, on a ``native`` node.
        target:
          anyOf:
          - $ref: '#/components/schemas/TargetLocation'
          - type: 'null'
            description: Projection Node schema.
          description: Target location, on a ``target`` node.
      additionalProperties: false
      type: object
      required:
      - id
      - kind
      - label
      title: ProjectionNode
      description: 'One node in the projection graph: native evidence, canonical construct,
        or target.


        A single model with a :attr:`kind` discriminator and kind-specific optional

        payloads, so the UI (EFP-2.2) can group nodes into source/native, canonical,
        and

        target lanes from one homogeneous list. Node :attr:`id` is deterministic —
        derived

        from the construct key and node kind — so identical inputs yield identical
        IDs.'
    ProjectionNodeKind:
      type: string
      enum:
      - native
      - canonical
      - target
      title: ProjectionNodeKind
      description: Which layer of the source→target projection a node belongs to.
    ProjectionReason:
      type: string
      enum:
      - destination_unsupported
      - emitter_unsupported
      - source_incomplete
      - source_parse_limit
      - option_excluded
      - security_redacted
      - target_tool_unavailable
      - not_applicable
      title: ProjectionReason
      description: 'The cause *category* of a non-preserved :class:`ProjectionStatus`
        (EFP-1.1).


        A destination limitation (``destination_unsupported``) must never be claimed
        when

        the real cause is apiome''s emitter (``emitter_unsupported``) or its source

        analysis (``source_incomplete`` / ``source_parse_limit``). EFP-1.2''s capability

        registry keys its reviewed explanation and documentation templates by these
        codes,

        so the taxonomy is the single source of truth for what a valid reason code
        is.'
    ProjectionStatus:
      type: string
      enum:
      - retained
      - transformed
      - approximated
      - synthesized
      - dropped
      - unavailable
      - not-applicable
      title: ProjectionStatus
      description: 'The fate of one construct when projected onto a target format
        (EFP-1.1).


        The four outcomes the :class:`~app.lossiness.LossinessReport` produces map

        one-to-one onto the first four members; the last three extend the vocabulary
        for

        richer emitter rule packs and the capability registry (EFP-1.2), and are never

        produced by the default report-driven build.'
