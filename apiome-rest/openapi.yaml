          - $ref: '#/components/schemas/ExportJobProgress'
          - type: 'null'
        result:
          anyOf:
          - $ref: '#/components/schemas/ExportJobResult'
          - type: 'null'
        error:
          anyOf:
          - $ref: '#/components/schemas/ExportJobError'
          - type: 'null'
          description: Structured failure detail; set only in the ``failed`` terminal
            state.
      type: object
      required:
      - job_id
      - state
      title: ExportJobStatus
      description: 'Poll payload for an export job (same shape as the import job status).


        A terminal job is self-describing: ``completed`` carries ``result`` (with
        a

        ``download_path`` for a real export), ``failed`` carries a structured ``error``
        (MFX-3.4).'
    ExportPreviewRequest:
      properties:
        artifact:
          type: string
          title: Artifact
          description: The artifact (project) id to export.
        version:
          anyOf:
          - type: string
          - type: 'null'
          title: Version
          description: Revision UUID, version label (``1.0.0``), or null for the latest
            revision.
        target:
          type: string
          title: Target
          description: Target emitter key (``openapi``) or format key (``openapi-3.1``).
        min_severity:
          $ref: '#/components/schemas/LossinessSeverity'
          description: Lowest loss severity that raises the advisory (MFX-2.4); does
            not affect the report or counts.
          default: info
      additionalProperties: false
      type: object
      required:
      - artifact
      - target
      title: ExportPreviewRequest
      description: 'A dry-run fidelity preview request: source revision + chosen target
        (MFX-2.5).'
    ExportPreviewResponse:
      properties:
        artifact:
          type: string
          title: Artifact
          description: The artifact (project) id the preview was computed for.
        version:
          anyOf:
          - type: string
          - type: 'null'
          title: Version
          description: The version selector as requested (label, UUID, or null).
        version_record_id:
          type: string
          title: Version Record Id
          description: The resolved revision (``versions.id``).
        version_label:
          anyOf:
          - type: string
          - type: 'null'
          title: Version Label
          description: The resolved revision's version label (e.g. ``1.0.0``).
        fidelity:
          $ref: '#/components/schemas/ExportFidelity'
          description: The full fidelity envelope (target + tier + report + advisory),
