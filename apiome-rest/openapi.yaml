          description: Ephemeral credential for this call only (never persisted).
        timeoutSeconds:
          type: number
          maximum: 120.0
          minimum: 1.0
          title: Timeoutseconds
          description: Per-request timeout in seconds for the test call (1-120).
          default: 30.0
