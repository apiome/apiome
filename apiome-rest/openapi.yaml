  /v1/mcp/{tenant_slug}/endpoints/{endpoint_id}/insight/percentile:
    get:
      tags:
      - mcp-catalog
      summary: Get Mcp Endpoint Insight Percentile
      description: 'Return the endpoint''s peer percentile & category ranking across
        four axes (MCAT-18.3).


        "Is this a good weather server?" needs a *peer baseline*, not an absolute
        grade. This ranks the

        endpoint against the other live endpoints in its catalog **category** — the
        *cohort* — on four

        axes: **grade** (the stored lint score), **safety** (annotation coverage crossed
        with the

        destructive/auth posture), **documentation** (documentation coverage), and
        **latency** (p95

        responsiveness). Each axis reuses the same derivation the endpoint''s own
        trust profile shows, so a

        rank never disagrees with the numbers on its Insight tab, and each carries
        the server''s percentile

        (share of the cohort at or below it), its rank, and the "top N%" the UI badges
        render.


        A blank/uncategorized endpoint is ranked within the uncategorized cohort.
        A **single-member**

        category is handled — the sole server is trivially the category leader. Any
        axis the endpoint has

        not measured (never scored, no tools, never tested) is an explicit *gap*,
        never a zero, so an

        undiscovered endpoint yields a coherent all-gap profile (a ``200``, never
        a ``500``). Scoping comes

        from the token''s tenant, so the cohort never spans another tenant''s catalog;
        returns ``404`` when

        the endpoint is not the caller''s tenant''s. A GET stays read-only, recomputed
        live as the catalog

        grows.'
      operationId: get_mcp_endpoint_insight_percentile_v1_mcp__tenant_slug__endpoints__endpoint_id__insight_percentile_get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: endpoint_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Endpoint Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpInsightPercentileResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/mcp/{tenant_slug}/endpoints/{endpoint_id}/insight/similar:
    get:
      tags:
      - mcp-catalog
      summary: Get Mcp Endpoint Similar
      description: 'Return "servers like this one" from capability overlap + optional
        semantic embeddings (MCAT-18.4).


        Ranks the caller''s other live endpoints against this one by two independent
        signals. **overlap** —

        always present — is the capability-name Jaccard overlap: peers sharing this
        server''s tool / resource /

        prompt names, ranked by set-overlap, with the shared names surfaced (a server
        with nothing in common

        is not returned). **semantic** is a cosine nearest-neighbour over a per-snapshot
        capability embedding

        and is populated only when ``embeddings_enabled`` — the feature flag is on
        *and* both this endpoint

        and at least one peer carry a backfilled embedding. When embeddings are disabled
        or unbackfilled,

        ``semantic`` is empty and the endpoint page falls back to overlap-only (the
        "gracefully no-ops if

        embeddings are disabled" acceptance criterion). A never-discovered endpoint
        has no capabilities, so

        both lists are empty (a ``200``, never a ``500``). Scoping comes from the
        token''s tenant, so neighbours

        never span another tenant''s catalog; returns ``404`` when the endpoint is
        not the caller''s tenant''s. A

        GET stays read-only, recomputed live as the catalog grows.'
      operationId: get_mcp_endpoint_similar_v1_mcp__tenant_slug__endpoints__endpoint_id__insight_similar_get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: endpoint_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Endpoint Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpSimilarServersResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/mcp/{tenant_slug}/endpoints/{endpoint_id}/insight/similar/reindex:
    post:
      tags:
      - mcp-catalog
      summary: Reindex Mcp Endpoint Similar
      description: '(Re)compute and store this endpoint''s current-snapshot capability
        embedding (MCAT-18.4).


        The backfill step behind the semantic similarity signal: it derives the deterministic
        capability text

        of the endpoint''s current surface (its tool/resource/prompt names + descriptions),
        embeds it via the

        Ollama embedding service, and stores the vector on the snapshot (V143) so
        the ``insight/similar``

        semantic list can find it. Every non-success is a labelled no-op, not an error
        (always a ``200``): the

        feature flag being off, the endpoint having no discovered surface or no capabilities
        to embed, the

        embedding service being unreachable, or pgvector being unavailable each return
        ``reindexed=false`` with

        a ``detail`` explaining why. Returns ``404`` when the endpoint is not the
        caller''s tenant''s.'
      operationId: reindex_mcp_endpoint_similar_v1_mcp__tenant_slug__endpoints__endpoint_id__insight_similar_reindex_post
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: endpoint_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Endpoint Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpSimilarReindexResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/mcp/{tenant_slug}/endpoints/{endpoint_id}/insight/summary:
    get:
      tags:
      - mcp-catalog
      summary: Get Mcp Endpoint Summary
      description: 'Return the endpoint''s usage examples and its cached AI digest,
        if any (MCAT-18.5).


        Two things in one read. ``examples`` — one **schema-derived example call per
        tool** of the current

        surface — is always present: it is synthesized deterministically from each
        tool''s ``input_schema``

        with no model call and no tool execution, so it needs neither the feature
        flag nor an API key. The

        AI-written ``digest`` ("this server lets you …") is returned only when one
        has already been generated

        and cached for the current ``surface_fingerprint`` (``null`` otherwise); ``ai_digest_enabled``
        tells

        the UI whether the gated ``…/insight/summary/generate`` action is available.
        Because the cache is keyed

        on the fingerprint, a surface change automatically presents as "no digest
        yet" until regenerated. A

        never-discovered endpoint yields empty ``examples`` and a ``null`` digest
        (a ``200``, never a ``500``).

        Scoping comes from the token''s tenant; ``404`` when the endpoint is not the
        caller''s tenant''s. Read-only.'
