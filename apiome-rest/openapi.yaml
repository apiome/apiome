    get:
      tags:
      - export-jobs
      summary: Download a completed export job's artifact
      description: Serve the artifact a completed export job produced — the target
        the poller was handed via ``result.download_path``. The bytes come from the
        job's retained emit result (no re-emit) and are **streamed** in fixed-size
        chunks with an up-front ``Content-Length`` (MFX-4.3), so a large bundle is
        not buffered whole. A **single-file** export (MFX-4.1) is served inline with
        the emitted file's content type and a ``Content-Disposition`` filename, byte-identical
        to the size the job manifest reported. A **multi-file** export (protobuf packages,
        WSDL+XSD, per-subject Avro) is served as an ``application/zip`` bundle (MFX-4.2)
        carrying every emitted file plus a root ``manifest.json``. A job that is not
        completed or is a dry-run (no artifact) is rejected with 409; a completed
        job whose retained artifact has passed its retention window (MFX-4.3) is 410
        Gone.
