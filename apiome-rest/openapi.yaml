      description: 'Set or replace an endpoint''s outbound credential (MCAT-6.5).


        The plaintext ``payload`` is sealed server-side (MCAT-6.2) before it is stored
        and is NEVER

        echoed back by any response. ``auth_type`` must be a secret-bearing scheme

        (:data:`MCP_CREDENTIAL_AUTH_TYPES`) — to remove a credential entirely (the
        anonymous ``none``

        state) DELETE the resource instead. ``oauth_metadata`` is non-secret OAuth2
        discovery metadata

        persisted as cleartext. Accepts both camelCase and snake_case keys so UI and
        CLI can share it.


