      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: endpoint_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Endpoint Id
      - name: base
        in: query
        required: true
        schema:
          type: string
          format: uuid
          description: The base (from) version id.
          title: Base
        description: The base (from) version id.
      - name: target
        in: query
        required: true
        schema:
          type: string
          format: uuid
          description: The target (to) version id.
          title: Target
