    get:
      tags:
      - versions
      summary: Get Version
      description: 'Get a specific version by ID.


        Supports authentication via JWT token or API key.


        Successor resolution (#749): when ``successorResolution`` is ``resolve`` or
        ``redirect``, follows

        ``metadata.successorRevisionId`` (#748) within the project until a revision
        has no successor, hits a

        protected branch tip / protected tag target (#504), or errors. Loops return
        409 ``SUCCESSOR_CYCLE``.


        Pull payload selection (#2591): ``includeSections`` / ``excludeSections``
        reduce JSON size for CI;

        the strong ETag still identifies the revision only (same as full body, #2568).


        Delta pull (#2592): ``sinceRevisionId`` adds ``schemaPullDelta`` (changed
        schema entities only).'
      operationId: get_version_v1_versions__tenant_slug___project_id___version_record_id__get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
          description: Tenant Slug schema.
        description: URL-safe tenant slug that scopes the request.
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          title: Project Id
          description: Project Id schema.
        description: Project identifier that scopes the request.
      - name: version_record_id
        in: path
        required: true
        schema:
          type: string
          title: Version Record Id
          description: Version Record Id schema.
        description: Version row identifier (``versions.id`` UUID).
      - name: successorResolution
        in: query
        required: false
        schema:
          enum:
          - none
          - resolve
          - redirect
          type: string
          description: 'none: return the requested revision only. resolve: follow
            metadata.successorRevisionId (same project, #748); JSON body is the final
            revision; see X-Apiome-* response headers. redirect: HTTP 307 to this
            path with the final revision id and successorResolution=none.'
          default: none
          title: Successorresolution
        description: 'none: return the requested revision only. resolve: follow metadata.successorRevisionId
          (same project, #748); JSON body is the final revision; see X-Apiome-* response
          headers. redirect: HTTP 307 to this path with the final revision id and
          successorResolution=none.'
      - name: auditSuccessorResolution
