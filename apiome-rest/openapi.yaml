        Unlike the async job''s metadata-only manifest (the bytes are served later
        by MFX-4.x),

        a synchronous dispatch returns the ``content`` inline — there is no job to
        poll and no

        separate download step.'
    ExportDispatchRequest:
      properties:
        artifact:
          type: string
          title: Artifact
          description: The artifact (project) id to export.
        version:
          anyOf:
          - type: string
          - type: 'null'
          title: Version
          description: Revision UUID, version label (``1.0.0``), or null for the latest
            revision.
        target:
          type: string
          title: Target
          description: Target emitter key (``openapi``) or format key (``openapi-3.1``).
        options:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Options
          description: Per-target emit options (MFX-1.4); null or empty applies the
            target defaults.
        dry_run:
          type: boolean
          title: Dry Run
          description: 'When true, stop after the fidelity report: no artifact is
            emitted.'
          default: false
        confirm:
          type: boolean
          title: Confirm
          description: When true, proceed with a **severe** conversion (MFX-3.3) the
