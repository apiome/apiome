          title: Artifact
          description: The artifact (project) id the dispatch exported.
          example: example
        version:
          anyOf:
          - type: string
            description: Response payload for export dispatch.
          - type: 'null'
            description: Response payload for export dispatch.
          title: Version
          description: The version selector as requested (label, UUID, or null).
        version_record_id:
          type: string
          title: Version Record Id
