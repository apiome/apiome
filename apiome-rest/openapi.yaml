          example: false
        pack:
          anyOf:
          - type: string
            description: Emitted Artifact Lint schema.
          - type: 'null'
            description: Emitted Artifact Lint schema.
          title: Pack
          description: The lint pack that ran (e.g. ``spectral:oas``), when applicable.
        score:
          anyOf:
          - type: integer
            description: Emitted Artifact Lint schema.
          - type: 'null'
            description: Emitted Artifact Lint schema.
          title: Score
          description: The 0–100 quality score, when the pack computes one.
        grade:
          anyOf:
          - type: string
            description: Emitted Artifact Lint schema.
          - type: 'null'
            description: Emitted Artifact Lint schema.
          title: Grade
          description: The A–F letter grade, when the pack computes one.
        findings:
          items:
            additionalProperties: true
