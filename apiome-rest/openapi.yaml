      - target
      title: ExportDispatchRequest
      description: 'A dispatch request: source revision + chosen target + options
        + dry-run flag (MFX-3.2).'
    ExportDispatchResponse:
      properties:
        artifact:
          type: string
          title: Artifact
          description: The artifact (project) id the dispatch exported.
        version:
          anyOf:
          - type: string
          - type: 'null'
          title: Version
          description: The version selector as requested (label, UUID, or null).
        version_record_id:
          type: string
          title: Version Record Id
          description: The resolved revision (``versions.id``).
        version_label:
          anyOf:
          - type: string
          - type: 'null'
          title: Version Label
          description: The resolved revision's version label (e.g. ``1.0.0``).
        target:
          type: string
          title: Target
          description: The resolved target format key (e.g. ``openapi-3.1``).
        dry_run:
