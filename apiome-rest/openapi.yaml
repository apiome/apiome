        description: When true, emit version_protection_audit for successor resolution
          (#749).
      - name: includeSections
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 'Comma-separated pull payload sections to include (#2591).
            Always includes id, project_id, and version_id. Mutually exclusive with
            excludeSections. Sections: core, commit, publish, lineage, governance,
            creator, project, timestamps.'
          title: Includesections
        description: 'Comma-separated pull payload sections to include (#2591). Always
          includes id, project_id, and version_id. Mutually exclusive with excludeSections.
          Sections: core, commit, publish, lineage, governance, creator, project,
          timestamps.'
      - name: excludeSections
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Comma-separated sections to omit from the pull body (#2591).
            Core identifiers cannot be removed. Mutually exclusive with includeSections.
          title: Excludesections
        description: Comma-separated sections to omit from the pull body (#2591).
          Core identifiers cannot be removed. Mutually exclusive with includeSections.
      - name: sinceRevisionId
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: When set, the JSON body includes schemaPullDelta with changed
            OpenAPI components.schemas entities since this revision (#2592). Must
            be the resolved head revision or an ancestor in the revision parent graph.
          title: Sincerevisionid
        description: When set, the JSON body includes schemaPullDelta with changed
          OpenAPI components.schemas entities since this revision (#2592). Must be
          the resolved head revision or an ancestor in the revision parent graph.
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
