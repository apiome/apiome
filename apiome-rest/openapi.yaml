      title: McpToolInvocationReliabilityOut
      description: 'Per-tool test-invocation reliability over a recent window (MCAT-17.2).


        ``tools`` is the per-tool breakdown (busiest first); the browser re-ranks
        it into "slowest" (by

        p95) and "flakiest" (by error rate) views. The scalar fields are the endpoint-wide
        totals over

        every tool call in the window; ``latency_distribution`` is a histogram of
        every tool call''s

        latency for the distribution chart. ``window_days`` echoes the trailing window
        the rows were

        selected over. An endpoint never tool-tested yields an empty ``tools`` list
        and zero totals.'
    McpToolReliabilityOut:
      properties:
