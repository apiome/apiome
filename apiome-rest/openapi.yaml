          description: Lowest loss severity that raises the advisory (MFX-2.4); does
            not affect the report or counts.
          default: info
      additionalProperties: false
      type: object
      required:
      - artifact
      - target
      title: ExportJobStartRequest
      description: 'Submit an export job: source coordinates + target + options +
        dry-run flag.


        The source half matches ``POST /export/preview`` / ``POST /export/document``

        (MFX-2.5/11.5); ``dry_run`` selects the preview-only path (fidelity report,
        no

        artifact), the async twin of the synchronous ``/export/preview`` endpoint.'
    ExportJobStatus:
      properties:
        job_id:
          type: string
          title: Job Id
        state:
          type: string
          enum:
          - queued
          - running
          - completed
          - failed
          - canceled
          title: State
        percent:
          type: integer
          maximum: 100.0
          minimum: 0.0
          title: Percent
          default: 0
        events:
          items:
            $ref: '#/components/schemas/ExportJobEvent'
