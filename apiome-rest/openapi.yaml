        \ latency.\n\nA single shape covers the three outcomes the invocation service\
        \ distinguishes, branchable on two\nbooleans (see :class:`app.mcp_invoke.InvocationResult`):\n\
        \n* ``completed=True,  is_error=False`` — the call ran and succeeded; ``content``\
        \ holds the result.\n* ``completed=True,  is_error=True``  — the call ran\
        \ but the tool reported a tool-level error\n  (``tools/call`` only); ``content``\
        \ holds the error payload the tool produced.\n* ``completed=False`` — the\
        \ call failed (a JSON-RPC protocol error or a transport/handshake\n  failure);\
        \ ``error`` carries the classified reason and ``content`` is empty.\n\n``auth_override_applied``\
        \ records whether the call used an ephemeral override (``True``) or the\n\
        endpoint's stored credential (``False``); the secret itself is never included\
        \ either way."
