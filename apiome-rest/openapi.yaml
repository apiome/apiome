        \ here: only the non-publishable\nslice is a catalog item, so requesting a\
        \ Project's id (or an unknown id) yields 404.\n\nSupports authentication via\
        \ JWT token or API key.\n\nArgs:\n    tenant_slug: The tenant slug.\n    item_id:\
        \ The catalog item ID.\n    auth_data: Authentication data (injected by dependency).\n\
        \nReturns:\n    The catalog item details, including its normalized summary\
