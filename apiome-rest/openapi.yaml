      description: "The overall go/no-go verdict for a one-call verify (MFX-42.1/42.5).\n\
        \nThe single band the Verify workbench's banner and Generate gate read, derived\
        \ from the\nvalidation gate (MFX-5.3) and the fidelity tier (MFX-2.5) per\
        \ the MFX-3.3 severity classes:\n\n* ``clean`` — a lossless conversion whose\
        \ emitted artifact validated (or had nothing to\n  validate); the green path.\n\
        * ``lossy`` — a valid artifact, but the conversion is not lossless; the user\
        \ may proceed only\n  after acknowledging the loss.\n* ``invalid`` — a validator\
        \ ran and rejected the emitted artifact; the export is blocked and no\n  acknowledgement\
        \ can override it."
    FormatCandidateModel:
