        schema:
          type: string
          format: uuid
          title: Endpoint Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpServerDigestResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/mcp/{tenant_slug}/endpoints/{endpoint_id}/insight/summary/generate:
    post:
      tags:
      - mcp-catalog
      summary: Generate Mcp Endpoint Summary
      description: '(Re)generate and cache the endpoint''s AI digest for its current
        surface (MCAT-18.5).


        The gated AI step. It (re)computes the schema-derived example calls (always),
        and — when

        ``APIOME_MCP_AI_DIGEST_ENABLED`` is on and an API key is configured — writes
        a short natural-language

        digest of the server via the Claude API and caches it under the current ``surface_fingerprint``
        so it

        is computed once per surface. If a digest is already cached for this exact
        surface, it is returned as

        is without calling the model (``from_cache=true``). Every non-success is a
        labelled no-op, not an

        error (always a ``200``): the feature flag being off, no API key, the endpoint
        having no discovered

        surface, or the model being unreachable / declining each return ``generated=false``
        with a ``detail``.

        No tool is executed — the examples are pure schema synthesis and the model
        is told the surface is

        descriptive only. ``404`` when the endpoint is not the caller''s tenant''s.'
