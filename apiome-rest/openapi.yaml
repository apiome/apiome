    TargetFidelity:
      properties:
        tier:
          $ref: '#/components/schemas/ExportFidelityTier'
          description: 'One-word fidelity badge: lossless / lossy / types-only.'
        preserved_percent:
          type: integer
          title: Preserved Percent
          description: Estimated share of constructs carried faithfully to the target,
            0–100 (constructs marked OK ÷ total). 100 when the source has no constructs.
          example: 100
        total:
          type: integer
          title: Total
          description: Total source constructs the prediction considered.
          example: 1
        preserved:
          type: integer
          title: Preserved
          description: Constructs carried faithfully (LossinessKind.OK).
          example: 1
        dropped:
          type: integer
          title: Dropped
          description: Constructs dropped entirely (LossinessKind.DROP).
          example: 1
        approximated:
          type: integer
          title: Approximated
          description: Constructs represented imperfectly (LossinessKind.APPROX).
          example: 1
        synthesized:
          type: integer
          title: Synthesized
          description: Constructs invented to satisfy the target (LossinessKind.SYNTH).
          example: 50
      additionalProperties: false
      type: object
      required:
      - tier
      - preserved_percent
      - total
      - preserved
      - dropped
      - approximated
      - synthesized
      title: TargetFidelity
      description: 'The cheap per-target fidelity summary for one (source, target)
        pairing (MFX-2.5).


        The lightweight half of the surface: a :attr:`tier` badge and a :attr:`preserved_percent`

        estimate plus the per-kind counts, all derived from the prediction report
        with no emit.

        The export dialog renders one of these per target card (MFX-6.1) and the version
        view

        aggregates them into its pre-summary (MFX-6.5); the full per-construct detail
        is fetched

        on demand via ``POST /export/preview`` (:class:`ExportFidelity`).'
    TargetLocation:
      properties:
        json_pointer:
          anyOf:
          - type: string
            description: Target Location schema.
          - type: 'null'
            description: Target Location schema.
          title: Json Pointer
          description: RFC 6901 JSON Pointer into the emitted document (JSON/YAML
            targets).
        native_path:
          anyOf:
          - type: string
            description: Target Location schema.
          - type: 'null'
            description: Target Location schema.
          title: Native Path
          description: Target-native path into the emitted artifact (SDL/schema/proto
            targets).
      additionalProperties: false
      type: object
      title: TargetLocation
      description: 'Where a construct lands in the emitted artifact, when a locator
        can place it.


        Exactly one addressing scheme is used per target: a :attr:`json_pointer` for

        JSON/YAML-document targets (OpenAPI, AsyncAPI) or a :attr:`native_path` for

        text/schema targets (a GraphQL type path, a Protobuf message field, an Avro

        record field). ``None`` for both when the target has no registered locator
        — a

        truthful "we cannot point to where this landed" rather than a guess.'
