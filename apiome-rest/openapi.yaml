      description: The auto-detection verdict for a document.
    EmittedArtifactLint:
      properties:
        applicable:
          type: boolean
          title: Applicable
          description: Whether a lint pack is registered for this target's format.
        pack:
          anyOf:
          - type: string
          - type: 'null'
          title: Pack
          description: The lint pack that ran (e.g. ``spectral:oas``), when applicable.
        score:
          anyOf:
          - type: integer
          - type: 'null'
          title: Score
          description: The 0–100 quality score, when the pack computes one.
        grade:
          anyOf:
          - type: string
          - type: 'null'
          title: Grade
          description: The A–F letter grade, when the pack computes one.
        findings:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Findings
          description: The itemized lint findings (severity, rule, message, location).
      additionalProperties: false
      type: object
      required:
      - applicable
      title: EmittedArtifactLint
      description: 'The emitted-artifact lint report slot for one verify (MFX-5.2
        → MFX-42.3).


        The lint pass over the emitted artifact is **MFX-5.2**, which is not yet implemented;
        until it

        lands, :func:`verify_export` returns ``lint: null`` and the Verify workbench
        renders the lint

        lens''s "no lint pack ran" empty state. This model documents the shape MFX-5.2
        will populate so

        the response contract is stable for the UI (`EmittedArtifactLintReport`).'
    EmittedValidationReport:
      properties:
        verdict:
          $ref: '#/components/schemas/ValidationVerdict'
          description: 'The validation band: valid / invalid / skipped / not_applicable.'
        target:
          type: string
          title: Target
          description: The resolved target format key that was validated (e.g. ``openapi-3.1``).
        tool:
          anyOf:
          - type: string
          - type: 'null'
          title: Tool
          description: The validator identity that ran (or would have run) for this
            target.
        applicable:
          type: boolean
          title: Applicable
          description: Whether a matching MFI import parser is registered for this
            format.
        validated:
          type: boolean
          title: Validated
          description: Whether validation actually ran in this runtime.
        valid:
          type: boolean
          title: Valid
          description: Whether the emitted artifact re-parsed cleanly when validation
            ran.
        blocks_delivery:
          type: boolean
          title: Blocks Delivery
          description: Whether the export job must fail before packaging/delivery.
            ``True`` only when a validator ran and rejected the artifact.
        warns:
          type: boolean
          title: Warns
          description: Whether the report should surface a warning (toolchain unavailable).
            ``True`` only for a ``skipped`` verdict.
        findings:
          items:
            $ref: '#/components/schemas/ValidationFinding'
          type: array
          title: Findings
          description: Structured parser/toolchain failures. Empty on a passing or
            skipped run.
        detail:
          anyOf:
          - type: string
          - type: 'null'
          title: Detail
          description: Why validation did not run (not applicable, or toolchain unavailable).
        headline:
          type: string
          title: Headline
          description: Short banner heading for the validation gate.
        message:
          type: string
          title: Message
          description: The full, ready-to-display validation sentence. Render verbatim.
      additionalProperties: false
      type: object
      required:
      - verdict
      - target
      - applicable
      - validated
      - valid
      - blocks_delivery
      - warns
      - headline
      - message
