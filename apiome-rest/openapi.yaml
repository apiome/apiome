        :func:`validate_authentication`. That is not interchangeable: ``validate_authentication``

        takes ``tenant_slug`` as its first parameter, which FastAPI resolves from
        the *path* on every

        tenant-scoped route. This route has no ``{tenant_slug}`` segment, so it would
        instead be

        resolved as a **required query parameter** — making the catalog return 422
        unless the caller

        invented a slug, and then authenticating against whatever they invented. The
        same reasoning is

        why ``GET /v1/lint/rules`` uses ``validate_session_credentials``.'
