      description: Per-hint behavioural-annotation coverage over a surface's tools.
    McpAuthOverride:
      properties:
        authType:
          type: string
          title: Authtype
        payload:
          additionalProperties: true
          type: object
          title: Payload
      type: object
      required:
      - authType
      title: McpAuthOverride
      description: 'An ephemeral credential to use for a single test call, in place
        of the stored one.


        Lets a tenant try an endpoint with a *throwaway* secret — a personal token,
        a not-yet-saved

        credential — without ever persisting it. The shape mirrors :class:`McpCredentialUpsert`

        (``auth_type`` + plaintext ``payload``), is validated against the same auth-type
        model at the

        route, and is used only to build request headers for this one invocation.
        It is **never** written

        to ``mcp_endpoint_credentials`` and never echoed back in any response.


        Unlike the stored-credential model, ``auth_type`` ``none`` is accepted here:
        it means "test this

        call anonymously", explicitly overriding any stored credential for this one
        request.


        Expected ``payload`` shape per ``auth_type`` (same as :class:`McpCredentialUpsert`):


        * ``none``   — payload ignored (anonymous test call)

        * ``bearer`` — ``{"token": "<secret>"}``

        * ``header`` — ``{"name": "<Header-Name>", "value": "<secret>"}``

        * ``oauth2`` — ``{"access_token": "<token>", "token_type": "Bearer"?}``

        * ``env``    — ``{"vars": {"NAME": "value", ...}}`` (contributes no HTTP headers)'
