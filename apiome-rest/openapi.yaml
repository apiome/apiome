          - type: 'null'
          title: Slug
        category:
          anyOf:
          - type: string
          - type: 'null'
          title: Category
        similarity:
          type: number
          title: Similarity
          default: 0.0
      type: object
      required:
      - endpoint_id
      - name
      title: McpSimilarEmbeddingNeighborOut
      description: 'One semantic-embedding similar server — a peer ranked by cosine
        similarity (MCAT-18.4).


        ``similarity`` is the cosine similarity (``-1``-``1``, higher = nearer) of
        the two snapshots''

        capability embeddings. Only present when semantic embeddings are enabled and
        backfilled.'
    McpSimilarOverlapNeighborOut:
      properties:
        endpoint_id:
          type: string
          title: Endpoint Id
        name:
          type: string
          title: Name
        slug:
          anyOf:
          - type: string
          - type: 'null'
          title: Slug
        category:
          anyOf:
          - type: string
          - type: 'null'
          title: Category
        similarity:
          type: number
          title: Similarity
          default: 0.0
        shared_count:
          type: integer
          title: Shared Count
          default: 0
        target_capability_count:
          type: integer
          title: Target Capability Count
          default: 0
        candidate_capability_count:
          type: integer
          title: Candidate Capability Count
          default: 0
        shared_capabilities:
          items:
            type: string
          type: array
          title: Shared Capabilities
      type: object
      required:
      - endpoint_id
      - name
      title: McpSimilarOverlapNeighborOut
      description: 'One capability-overlap similar server — a peer ranked by shared
        capability names (MCAT-18.4).


        ``similarity`` is the Jaccard index (``0``-``1``) of the two servers'' capability-name
        sets;

        ``shared_capabilities`` lists the names in common (normalized, sorted), ``shared_count``
        its size;

        ``target_capability_count`` / ``candidate_capability_count`` are the two servers''
        distinct-name

        counts, so the UI can render "8 of 12 capabilities shared".'
    McpSimilarReindexResponse:
      properties:
        success:
          type: boolean
          title: Success
          default: true
        endpoint_id:
          type: string
          title: Endpoint Id
        embeddings_enabled:
          type: boolean
          title: Embeddings Enabled
          default: false
        reindexed:
          type: boolean
          title: Reindexed
          default: false
        version_id:
          anyOf:
          - type: string
          - type: 'null'
          title: Version Id
        detail:
          type: string
          title: Detail
          default: ''
      type: object
      required:
      - endpoint_id
      title: McpSimilarReindexResponse
      description: 'Response envelope for the similar-servers embedding backfill (MCAT-18.4).


        Records the outcome of (re)computing and storing this endpoint''s current-snapshot
        capability

        embedding for the semantic similarity signal. ``embeddings_enabled`` reflects
        the feature flag;

        ``reindexed`` is true only when an embedding was actually generated and stored.
        When the flag is off,

        the endpoint has no discovered surface, or the embedding service / pgvector
        is unavailable,

        ``reindexed`` is false and ``detail`` explains why — always a ``200`` describing
        the no-op, never an

        error.'
    McpSimilarServersResponse:
      properties:
        success:
          type: boolean
          title: Success
          default: true
        endpoint_id:
          type: string
          title: Endpoint Id
        embeddings_enabled:
          type: boolean
          title: Embeddings Enabled
          default: false
        target_capability_count:
          type: integer
          title: Target Capability Count
          default: 0
        overlap:
          items:
            $ref: '#/components/schemas/McpSimilarOverlapNeighborOut'
          type: array
          title: Overlap
        semantic:
          items:
            $ref: '#/components/schemas/McpSimilarEmbeddingNeighborOut'
          type: array
          title: Semantic
      type: object
      required:
      - endpoint_id
      title: McpSimilarServersResponse
      description: 'Response envelope for an endpoint''s "similar servers" discovery
        (MCAT-18.4).


        Surfaces "servers like this one" from two independent signals, each ranked
        against the caller''s own

        live catalog: ``overlap`` — always present — ranks peers by capability-name
        Jaccard overlap;

        ``semantic`` ranks peers by cosine nearest-neighbour over a capability embedding,
        and is only

        populated when ``embeddings_enabled`` is true (the flag is on and both this
        endpoint and at least one

        peer have a backfilled embedding). When embeddings are disabled or unbackfilled,
        ``embeddings_enabled``

        is false and ``semantic`` is empty — the feature gracefully falls back to
        overlap-only, never a

        ``500``. ``target_capability_count`` is this endpoint''s own distinct capability-name
        count (``0`` when

        it was never discovered, in which case ``overlap`` is empty too).'
