          title: Matched
          description: Whether any detector recognized the document.
        detected:
          anyOf:
          - $ref: '#/components/schemas/FormatCandidateModel'
          - type: 'null'
          description: The best candidate, or null when nothing matched.
        ambiguous:
          type: boolean
          title: Ambiguous
          description: True when leading formats tie within the ambiguity margin (prompt
            the user).
        candidates:
          items:
            $ref: '#/components/schemas/FormatCandidateModel'
          type: array
          title: Candidates
          description: All distinct-format candidates, ranked.
        ambiguous_candidates:
          items:
            $ref: '#/components/schemas/FormatCandidateModel'
          type: array
          title: Ambiguous Candidates
          description: The close cluster to choose between when ambiguous; empty otherwise.
        archive_root:
          anyOf:
          - type: string
          - type: 'null'
          title: Archive Root
          description: When the request carried an archive, the chosen root member
