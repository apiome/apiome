          description: Repository Id schema.
        description: Connected repository identifier.
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            description: Refresh Tenant Repository Nowauthorization schema.
          - type: 'null'
            description: Refresh Tenant Repository Nowauthorization schema.
          title: Authorization
          description: Authorization schema.
        description: 'JWT bearer token for authenticated access (``Authorization:
          Bearer <token>``).'
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            description: Refresh Tenant Repository Now Xapikey schema.
          - type: 'null'
            description: Refresh Tenant Repository Now Xapikey schema.
          title: X-Api-Key
          description: X-Api-Key schema.
        description: Tenant-scoped API key used as an alternative to JWT bearer authentication.
      requestBody:
        required: true
        content:
          application/json:
            schema:
