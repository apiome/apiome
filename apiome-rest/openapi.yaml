  /v1/mcp/{tenant_slug}/endpoints/{endpoint_id}/versions/{version_id}/trust-posture:
    get:
      tags:
      - mcp-catalog
      summary: Get Mcp Endpoint Version Trust Posture
      description: "Run and gate a trust-posture profile over one MCP version snapshot.\n\
        \nAssesses what the server is built from — its advertised metadata, its linked\
        \ source, and its\ndependencies — mapped to the OWASP MCP Top 10, then gates\
        \ the result.\n\nTwo honesty guarantees are visible in every response and\
        \ must not be ignored by a consumer:\n\n* Every finding carries ``exploitability``\
        \ — always ``static_signal`` today, because no dynamic\n  probe exists yet\
        \ (CLX-3.3, #4857). ``proven_count`` is 0. Nothing here is a demonstrated\n\
        \  exploit; each is a signal a reviewer should confirm.\n* Rules whose evidence\
        \ is absent (no linked source, no SBOM, no vulnerability lookup) appear in\n\
        \  ``skipped_rules`` with a reason, never as passes. Use ``requireFullCoverage``\
        \ to fail the gate\n  when the scan could not look at everything.\n\nRead-only\
        \ and side-effect free: recomputed on each request from persisted evidence.\
        \ The metadata\nlane is fully offline; the dependency lane transmits only\
        \ package coordinates, and only when\nvulnerability lookup is explicitly enabled.\
        \ ``format=sarif`` / ``junit`` return the CI artifact.\n404 when the endpoint\
        \ or version is not the caller's tenant's; 400 on an unknown profile."
      operationId: get_mcp_endpoint_version_trust_posture_v1_mcp__tenant_slug__endpoints__endpoint_id__versions__version_id__trust_posture_get
