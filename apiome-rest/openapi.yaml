  /v1/types/{tenant_slug}/resolve:
    post:
      tags:
      - type-registry
      summary: Resolve Refs
      description: "Re-resolve the tenant's ``$ref`` edges and return the dependency\
        \ listing (#3459).\n\nThe resolver API for the UI and Designer (#3470). It\
        \ walks every primitive visible to\nthe tenant (system-core ∪ own), re-evaluates\
        \ each stored dependency edge's\nresolved/unresolved status against the *current*\
        \ registry — so a target created since\nthe edge was last computed now resolves,\
        \ and a deleted one now dangles — and persists\nthe refreshed edges for any\
        \ of the tenant's own primitives whose status changed\n(\"re-resolve updates\
        \ statuses\"). Each resolved edge is enriched with its dependency\ntarget's\
        \ id and name so the response is the dependency graph the resolver UI lists.\n\
        \nOnly primitives that carry at least one ``$ref`` edge appear in ``primitives``;\
        \ the\nflat system-core seed (no refs) is omitted. System-core rows are read-only,\
        \ so a status\nchange on one is reflected in the response but never written\
        \ back.\n\nArgs:\n    tenant_slug: The tenant slug (caller scope comes from\
        \ the authenticated token).\n    auth_data: Authentication data (injected\
        \ by dependency).\n\nReturns:\n    ``ResolveResponse`` with tenant-wide edge\
        \ counts, the number of primitives whose\n    stored statuses were updated\
        \ by this pass, and the per-primitive dependency listing."
      operationId: resolve_refs_v1_types__tenant_slug__resolve_post
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
          description: Tenant Slug schema.
        description: URL-safe tenant slug that scopes the request.
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            description: Resolve Refsauthorization schema.
          - type: 'null'
            description: Resolve Refsauthorization schema.
          title: Authorization
          description: Authorization schema.
        description: 'JWT bearer token for authenticated access (``Authorization:
          Bearer <token>``).'
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            description: Resolve Refs Xapikey schema.
          - type: 'null'
            description: Resolve Refs Xapikey schema.
          title: X-Api-Key
          description: X-Api-Key schema.
        description: Tenant-scoped API key used as an alternative to JWT bearer authentication.
      responses:
        '200':
          description: Successful response for resolve refs.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ResolveResponse'
                description: Response payload for resolve refsresponse200.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
                description: Response payload for resolve refsresponse422.
