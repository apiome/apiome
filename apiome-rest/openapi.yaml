  /v1/catalog/{tenant_slug}/{item_id}/lint:
    get:
      tags:
      - catalog
      summary: Lint Catalog Item
      description: "Score a catalog item's latest revision and return itemized lint\
        \ findings (MFI-23.10).\n\nThe catalog analog of ``GET /v1/versions/{tenant_slug}/{project_id}/{version_record_id}/lint``:\n\
        it lets the Catalog card/detail lint orbs open the *same* server-computed\
        \ lint report the\nProjects screens use, populated from the item's own revision\
        \ rather than browser-local history.\n\nA catalog item's id *is* a project\
        \ id (the Catalog is the non-publishable slice of projects,\nMFI-23.1), so\
        \ the latest revision is resolved here and fed to the shared\n:func:`app.lint_routes.build_lint_report`.\
        \ Like the other catalog reads this is restricted to\nthe non-publishable\
        \ slice — a Project's id, or an unknown id, yields 404 — and authenticated\
        \ via\nJWT token or API key.\n\nArgs:\n    tenant_slug: The tenant slug (used\
        \ to reconstruct the OpenAPI document).\n    item_id: The catalog item ID\
        \ (a project id).\n    auth_data: Authentication data (injected by dependency).\n\
        \nReturns:\n    The server-computed quality score, A-F grade and itemized\
        \ findings for the latest revision."
      operationId: lint_catalog_item_v1_catalog__tenant_slug___item_id__lint_get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
