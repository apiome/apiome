            Ignored for safe tools.
          default: false
      type: object
      required:
      - itemType
      - itemName
      title: McpEndpointTestRequest
      description: 'Invoke one cataloged capability against its live MCP server and
        report the result.


        Names the capability to exercise on the endpoint''s *current* discovered surface
        and the

        arguments to call it with. ``item_type`` selects the invocation method

        (``tool`` → ``tools/call``, ``resource`` → ``resources/read``, ``prompt``
        → ``prompts/get``);

        ``item_name`` is the capability''s discovered name (for a resource, its name
        — the route resolves

        it to the stored concrete ``uri``). ``arguments`` is validated against a tool''s
        stored

        ``inputSchema`` (and a prompt''s required arguments) before the call leaves
        the server.


        ``auth_override`` supplies an ephemeral credential for this one call only
        (never persisted);

        when omitted the endpoint''s stored credential is used. ``timeout_seconds``
        bounds each request

        in the connect → handshake → invoke sequence.'
    McpEndpointTestResponse:
      properties:
        success:
          type: boolean
          title: Success
          default: true
        endpointId:
          type: string
          title: Endpointid
        itemType:
          type: string
          title: Itemtype
        itemName:
          type: string
          title: Itemname
        method:
          type: string
          title: Method
          description: The JSON-RPC method invoked (e.g. 'tools/call').
        target:
          type: string
          title: Target
          description: 'What was invoked: a tool/prompt name, or a resource uri.'
        completed:
          type: boolean
          title: Completed
          description: True when the server returned a JSON-RPC result (success or
            tool error).
        isError:
          type: boolean
          title: Iserror
          description: True when a tool ran but reported a tool-level error (tools/call
            only).
        content:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Content
          description: Returned payload items (tool content / resource contents /
            prompt messages).
        structuredContent:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Structuredcontent
          description: A tool's optional structuredContent object, when present.
        latencyMs:
          type: number
          title: Latencyms
          description: Round-trip wall-clock in ms (connect + handshake + invoke).
        error:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Error
          description: The classified failure when completed is False; null otherwise.
        authOverrideApplied:
          type: boolean
          title: Authoverrideapplied
          description: True when an ephemeral auth override was used instead of stored
            credentials.
          default: false
        invocationId:
          anyOf:
          - type: string
          - type: 'null'
          title: Invocationid
          description: Id of the persisted mcp_test_invocations log row, or null if
            logging failed.
