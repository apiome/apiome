      type: object
      required:
      - path
      - size_bytes
      title: ExportJobFile
      description: 'One emitted file''s manifest entry — metadata only, never the
        content.


        The delivery epics (MFX-4.x) serve the bytes; the job result carries just
        enough

        for a caller to show what was produced and how large it is.'
    ExportJobListItem:
      properties:
        job_id:
          type: string
          title: Job Id
        state:
          type: string
          enum:
          - queued
          - running
          - completed
          - failed
          - canceled
          title: State
        percent:
          type: integer
          maximum: 100.0
          minimum: 0.0
          title: Percent
          default: 0
        status_path:
          type: string
          title: Status Path
          description: Relative URL for GET …/jobs/{job_id}.
        artifact:
          type: string
          title: Artifact
          description: The artifact (project) id being exported.
        target:
          type: string
          title: Target
          description: The requested target (as submitted).
        dry_run:
          type: boolean
          title: Dry Run
          description: True when the job is a fidelity-only dry-run.
        progress:
