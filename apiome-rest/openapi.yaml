components:
  schemas:
    ApiParadigm:
      type: string
      enum:
      - rest
      - rpc
      - event
      - graph
      - data_schema
      title: ApiParadigm
      description: 'The high-level interaction style a format belongs to.


        A format declares exactly one paradigm; it selects which canonical fields

        are load-bearing (for example ``channels`` matter for ``EVENT`` but not for

        ``REST``) and drives browse/search facets.'
    BrowseDirectoryStats:
      properties:
        tenant_count:
          type: integer
          title: Tenant Count
          description: Number of tenant.
          example: 1
        project_count:
          type: integer
          title: Project Count
          description: Number of project.
          example: 1
        version_count:
          type: integer
          title: Version Count
          description: Number of version.
          example: 1
      type: object
      required:
      - tenant_count
      - project_count
      - version_count
      title: BrowseDirectoryStats
      description: Aggregate counts for published public specs (browse directory home).
    BrowsePublicProjectRow:
      properties:
        slug:
          type: string
          title: Slug
          description: URL-safe identifier.
          example: pet-store
        name:
          type: string
          title: Name
          description: Human-readable name.
          example: Pet
        domain:
          type: string
          title: Domain
          description: Domain.
          example: example
        published_versions:
          type: integer
          title: Published Versions
          description: Published Versions.
          example: 1
        latest_version:
          anyOf:
          - type: string
            description: Browse Public Project Row schema.
          - type: 'null'
            description: Browse Public Project Row schema.
          title: Latest Version
          description: Latest Version.
        latest_published_at:
          anyOf:
          - type: string
            format: date-time
            description: Browse Public Project Row schema.
          - type: 'null'
            description: Browse Public Project Row schema.
          title: Latest Published At
          description: Latest Published At timestamp (ISO 8601).
      type: object
      required:
      - slug
      - name
      - domain
      - published_versions
      title: BrowsePublicProjectRow
      description: One project row for public browse (per tenant).
    BrowsePublicProjectsResponse:
      properties:
        tenant_slug:
          type: string
          title: Tenant Slug
          description: URL-safe tenant slug used in path parameters.
          example: acme
        tenant_name:
          type: string
          title: Tenant Name
          description: Tenant Name.
          example: Example
        projects:
          items:
            $ref: '#/components/schemas/BrowsePublicProjectRow'
          type: array
          title: Projects
          description: Projects.
          maxItems: 1000
        filtered_count:
          type: integer
          title: Filtered Count
          description: Number of filtered.
          example: 1
      type: object
      required:
      - tenant_slug
      - tenant_name
      - projects
      - filtered_count
      title: BrowsePublicProjectsResponse
      description: Published-public projects for a tenant (anonymous), or full tenant
        project list for members.
    BrowsePublicTenantRow:
      properties:
        slug:
          type: string
          title: Slug
          description: URL-safe identifier.
          example: pet-store
        name:
          type: string
          title: Name
          description: Human-readable name.
          example: Pet
        project_count:
          type: integer
          title: Project Count
          description: Number of project.
          example: 1
        published_versions:
          type: integer
          title: Published Versions
          description: Published Versions.
          example: 1
        latest_version:
          anyOf:
          - type: string
            description: Browse Public Tenant Row schema.
          - type: 'null'
            description: Browse Public Tenant Row schema.
          title: Latest Version
          description: Latest Version.
        latest_activity_at:
          anyOf:
          - type: string
            format: date-time
            description: Browse Public Tenant Row schema.
          - type: 'null'
            description: Browse Public Tenant Row schema.
