    TranscodeGuard:
      properties:
        verdict:
          $ref: '#/components/schemas/TranscodeVerdict'
          description: 'The conversion band: clean / lossy / near-empty / severe.'
        requires_confirmation:
          type: boolean
          title: Requires Confirmation
          description: Whether the export must be explicitly confirmed before it runs.
            ``True`` only for a ``severe`` conversion; a ``near-empty`` warning does
            not block.
          example: false
        source_paradigm:
          $ref: '#/components/schemas/ApiParadigm'
          description: The source model's paradigm (rest / rpc / event / graph / data_schema).
        target_paradigm:
          $ref: '#/components/schemas/ApiParadigm'
          description: The target emitter's primary paradigm.
        target_format:
          type: string
          title: Target Format
          description: Human label for the target format woven into the copy (e.g.
            ``Apache Avro``).
          example: openapi
        preserved_percent:
          type: integer
          title: Preserved Percent
          description: Estimated share of constructs carried faithfully, 0–100 (from
            the report).
          example: 100
        dropped_operations:
          type: integer
          title: Dropped Operations
          description: Source operations the target structurally cannot represent
            (``0`` when it can carry operations).
          example: 1
        dropped_events:
          type: integer
          title: Dropped Events
          description: Source event channels the target structurally cannot represent
            (``0`` when it can carry events).
          example: 1
        dropped_constructs:
          type: integer
          title: Dropped Constructs
          description: Total constructs the fidelity report drops entirely (LossinessKind.DROP).
          example: 1
        critical_constructs:
          type: integer
          title: Critical Constructs
          description: Constructs the report drops/degrades at ``critical`` severity.
          example: 1
        headline:
          type: string
          title: Headline
          description: Short banner heading for the guard.
          example: example
        message:
          type: string
          title: Message
          description: The full, ready-to-display guard sentence. Consumers render
            it verbatim.
          example: Example validation message.
        reasons:
          items:
            type: string
          type: array
          title: Reasons
          description: 'The structured *why*: one line per contributing factor, drawn
            from the paradigm mismatch and the fidelity report.'
          maxItems: 1000
      additionalProperties: false
      type: object
      required:
      - verdict
      - requires_confirmation
      - source_paradigm
      - target_paradigm
      - target_format
      - preserved_percent
      - dropped_operations
      - dropped_events
      - dropped_constructs
      - critical_constructs
      - headline
      - message
      title: TranscodeGuard
      description: 'The pre-flight verdict for one (source, target) conversion (MFX-3.3).


        Pairs the coarse :class:`TranscodeVerdict` band with the structured *why*
        — the source

        and target paradigms, how many operations/events the target cannot carry,
        and the

        report''s dropped / critical counts — plus ready-to-render :attr:`headline`
        / :attr:`message`

        copy. The single gate the surfaces read is :attr:`requires_confirmation`:
        ``True`` only

        for a ``severe`` conversion, so a UI/CLI/REST caller blocks the export until
        the user

        explicitly confirms, while a ``near-empty`` warning is shown but never blocks.


        Every field is derived purely from the source model, the target''s capability
        profile,

        and the fidelity report, so the guard a preview surfaces and the guard the
        export enforces

        agree for the same inputs.'
    TranscodeVerdict:
      type: string
      enum:
      - clean
      - lossy
      - near-empty
      - severe
      title: TranscodeVerdict
      description: 'The band a source → target conversion falls into (MFX-3.3).


        A coarse, at-a-glance classification distinct from the per-construct fidelity
        report:

        it answers *how sane is this conversion?* rather than *what exactly is lost?*.
        Ordered

        from safest to worst — ``clean`` needs no attention, ``severe`` needs an explicit

        confirmation before the export runs.'
