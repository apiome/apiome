      description: "Export a self-contained one-page report card for an endpoint version\
        \ (MCAT-19.1).\n\nSerializes the same panels the in-app Insight view shows\
        \ — identity, grade + score breakdown,\ncapability surface, safety posture,\
        \ documentation coverage, license & terms signals,\ndeprecation & lifecycle\
        \ signals, the composite trust radar, and the change-since-previous\nsummary\
        \ — into a shareable **Markdown**\nor **HTML** document (the HTML\ncarries\
        \ a print stylesheet, so \"PDF\" is the browser's print-to-PDF of the same\
        \ file). No new\nmetric is computed: the route fetches the values the Insight\
        \ endpoints already produce and the\npure :mod:`app.mcp_report_card` layer\
        \ renders them.\n\nVisibility is honoured by the standard token-tenant scoping\
        \ — a cross-tenant (or private,\nnon-tenant) endpoint id reads as ``404``.\
        \ A **never-discovered or never-scored** endpoint yields\na graceful *partial*\
        \ report (identity present; the unavailable sections say so) rather than an\n\
        error. No credential secret ever reaches the report — only the auth posture\
        \ and ``auth_type``.\n\nArgs:\n    tenant_slug: Informational; scoping comes\
        \ from the validated token's tenant.\n    endpoint_id: The endpoint to report\
