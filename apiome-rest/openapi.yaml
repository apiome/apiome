          description: Fallback API title when the source has none.
        version:
          anyOf:
          - type: string
          - type: 'null'
          title: Version
          description: Fallback API version when the source declares none.
        servers:
          items:
            type: string
          type: array
          title: Servers
          description: Fallback server URLs when the source declares no servers.
      additionalProperties: false
      type: object
      title: ConversionDefaultsRequest
      description: 'User-supplied defaults that close cheap gaps *before* a catalog
        → OpenAPI conversion commits

        (MFI-22.6).


        All optional; each is applied to the emitted document only where the source
        model left the

        corresponding construct empty (a default never overwrites a value the source
        declared). Mirrors

        the inline defaults the preview screen (MFI-22.4) collects and the ``ConversionDefaults``
        the job

        (MFI-22.5) consumes.'
    ConvertCatalogItemRequest:
      properties:
        target:
          type: string
          title: Target
          description: Conversion target format (only 'openapi' today).
          default: openapi
        dry_run:
          type: boolean
          title: Dry Run
          description: When true, return the fidelity report with no side effects;
            when false, commit.
          default: true
        defaults:
          anyOf:
          - $ref: '#/components/schemas/ConversionDefaultsRequest'
          - type: 'null'
          description: Optional user-supplied fallbacks applied only where the source
            is empty.
      additionalProperties: false
      type: object
      title: ConvertCatalogItemRequest
      description: 'Request body for ``POST /v1/catalog/{tenant_slug}/{item_id}/convert``
        (MFI-22.6).


        Carries the conversion target (``openapi`` is the only one today, but the
        verb is target-generic

        for future emitters), the ``dryRun`` flag (the query param is authoritative
        for the side-effect

        decision; this mirrors it so a body-only caller still works), and the optional
        user defaults.'
    CopyClassToInlineSchemaRequest:
      properties:
