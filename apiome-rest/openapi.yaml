        Reports whether the registry's storage backend — the shared\n``apiome-db``\
        \ connection backing ``apiome.primitives`` — is reachable.\nLike the global\
        \ ``/health`` endpoint this is intentionally anonymous so\nmonitors can probe\
        \ the registry layer without credentials; every data\naccess endpoint below\
        \ remains authenticated and tenant-scoped.\n\nRegistered before ``GET /{tenant_slug}``\
        \ so the literal ``health`` path is\nmatched here rather than being captured\
        \ as a tenant slug.\n\nReturns:\n    Registry health: overall ``status``,\
        \ the ``apiome-db``\n    ``connection`` state, and whether the ``apiome.primitives``\
        \ storage table\n    is present. On failure ``status`` is ``unhealthy`` and\
        \ ``error`` carries\n    the driver message; the endpoint itself still responds\
        \ 200 so the probe\n    is always reachable (mirrors the global ``/health``\
        \ contract)."
      operationId: registry_health_v1_primitives_health_get
      responses:
        '200':
          description: Successful response for registry health.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RegistryHealthResponse'
                description: Response payload for registry healthresponse200.
