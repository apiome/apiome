  /v1/tenants/{tenant_slug}/repository-imports/{import_id}/spec:
    get:
      tags:
      - tenant-repositories
      summary: Read Repository Import Spec
      description: "Read the stored import spec for an imported repository file (RAR-1.5).\n\
        \nTwo lookup modes share this route, mirroring the ticket's\n``GET …/repository-imports/{id}/spec``\
        \ plus ``?path=`` variant:\n\n- **By import id (default).** ``import_id``\
        \ is the\n  ``apiome.repository_import_spec`` row id; the spec for that file\
        \ lineage is\n  returned. This is the \"read the spec for a file/import id\"\
        \ path.\n- **By path (``?path=`` present).** ``import_id`` is reinterpreted\
        \ as the\n  *repository* id and the latest spec for that repository / ``branch``\
        \ /\n  ``path`` lineage is resolved. ``branch`` is optional: when omitted\
        \ the most\n  recently updated spec across branches for that path is returned.\n\
        \nIn both modes the lookup is scoped to the caller's tenant (from the auth\n\
        token), so a spec belonging to another tenant returns 404 rather than\nleaking.\
        \ The returned ``options`` blob is upgraded on read to the current\nenvelope\
        \ shape (RAR-1.4), and ``spec_schema_version`` reports that current\nversion.\n\
        \nArgs:\n    tenant_slug: Tenant slug from the path (scoping comes from the\
        \ token).\n    import_id: Import-spec row id, or repository id when ``path``\
        \ is given.\n    auth_data: Authenticated principal; supplies the tenant scope.\n\
        \    path: Repository-relative file path for the ``?path=`` lookup variant.\n\
        \    branch: Optional branch filter for the ``?path=`` lookup variant.\n\n\
        Returns:\n    The current-shape import spec for the resolved file.\n\nRaises:\n\
        \    HTTPException: 404 when no spec exists for the id/path within the tenant."
      operationId: read_repository_import_spec_v1_tenants__tenant_slug__repository_imports__import_id__spec_get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: import_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Import Id
      - name: path
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Path
      - name: branch
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Branch
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepositoryImportSpecRead'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/tenants/{tenant_slug}/repositories/{repository_id}/refresh:
    post:
      tags:
      - tenant-repositories
      summary: Refresh Tenant Repository Now
      description: "Trigger a one-shot manual \"Refresh Now\" (RAR-5.2, #3533).\n\n\
        Runs the same spec-faithful re-import path as the periodic sweep (RAR-4.1)\
        \ for\na single file or the whole repository, on demand. It uses the stored\
        \ import\nspec (not defaults), honors the RAR-2.2 freshness gate (only files\
        \ newer than\nthe last import enqueue) and the RAR-4.4 divergence guard (applied\
        \ downstream\nby the executor), and works even when scheduled auto-refresh\
        \ is disabled —\nthe cadence and the ``auto_refresh_enabled`` / kill-switch\
        \ gates are\ndeliberately bypassed.\n\nRequest body (all optional): ``path``\
        \ for a single file, ``branch`` to scope a\nbranch; omit both to refresh every\
        \ branch that has a stored spec.\n\nArgs:\n    tenant_slug: Tenant slug from\
        \ the path (scoping comes from the token).\n    repository_id: The repository\
        \ to refresh.\n    payload: Optional ``path`` / ``branch`` selectors.\n  \
        \  auth_data: Authenticated principal; supplies the tenant scope.\n\nReturns:\n\
        \    Counts of jobs enqueued / skipped and the branches evaluated.\n\nRaises:\n\
        \    HTTPException: 404 when the repository does not belong to the tenant."
      operationId: refresh_tenant_repository_now_v1_tenants__tenant_slug__repositories__repository_id__refresh_post
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: repository_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Repository Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RepositoryRefreshNowRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RepositoryRefreshNowResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/tenants/{tenant_slug}/repositories/{repository_id}/refresh-history:
    get:
      tags:
      - tenant-repositories
      summary: List Repository Refresh History
      description: "List refresh-cycle audit history for a repository (RAR-5.3, #3534).\n\
        \nEach refresh cycle records who/what triggered it, the freshness decision,\
        \ the\noutcome (new-version / unchanged / diverged / failed), and the change-report\
        \ and\nversion links. The history is queryable **per repo** (this endpoint)\
        \ and **per\nfile** (add ``?path=``). Newest first.\n\nArgs:\n    tenant_slug:\
        \ Tenant slug from the path (scoping comes from the token).\n    repository_id:\
        \ The repository whose refresh history to list.\n    path: Optional file path\
        \ for per-file history.\n    branch: Optional branch scope.\n    trigger:\
        \ Optional trigger filter.\n    outcome: Optional outcome filter.\n    since:\
        \ Optional inclusive ISO-8601 lower bound on ``createdAt``.\n    until: Optional\
        \ inclusive ISO-8601 upper bound on ``createdAt``.\n    limit: Page size (1..200).\n\
        \    offset: Page offset.\n\nReturns:\n    A paginated, newest-first page\
        \ of refresh-cycle entries.\n\nRaises:\n    HTTPException: 404 when the repository\
        \ does not belong to the tenant."
      operationId: list_repository_refresh_history_v1_tenants__tenant_slug__repositories__repository_id__refresh_history_get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: repository_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Repository Id
      - name: path
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Restrict to a single imported file (per-file history).
          title: Path
        description: Restrict to a single imported file (per-file history).
      - name: branch
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Restrict to a single branch.
          title: Branch
        description: Restrict to a single branch.
      - name: trigger
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 'Filter by trigger: scheduled | manual | webhook.'
          title: Trigger
        description: 'Filter by trigger: scheduled | manual | webhook.'
      - name: outcome
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 'Filter by outcome: new-version | unchanged | diverged | failed.'
          title: Outcome
        description: 'Filter by outcome: new-version | unchanged | diverged | failed.'
      - name: since
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Inclusive lower bound on createdAt (ISO 8601).
          title: Since
        description: Inclusive lower bound on createdAt (ISO 8601).
      - name: until
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Inclusive upper bound on createdAt (ISO 8601).
          title: Until
        description: Inclusive upper bound on createdAt (ISO 8601).
      - name: limit
        in: query
        required: false
        schema:
          type: integer
          maximum: 200
          minimum: 1
          default: 50
          title: Limit
      - name: offset
        in: query
        required: false
        schema:
          type: integer
          minimum: 0
          default: 0
          title: Offset
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/RefreshHistoryPageResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
