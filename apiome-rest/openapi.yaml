      description: 'The validation gate + structured report for one emitted artifact
        (MFX-5.3).


        Pairs the coarse :class:`ValidationVerdict` with structured findings and ready-to-render

        :attr:`headline` / :attr:`message` copy. The single gate export surfaces read
        is

        :attr:`blocks_delivery` (``True`` only for ``invalid``) and :attr:`warns`
        (``True`` only

        for ``skipped``).'
    EmitterDescriptor:
      properties:
        key:
