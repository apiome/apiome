        ``True`` only

        for a ``severe`` conversion, so a UI/CLI/REST caller blocks the export until
        the user

        explicitly confirms, while a ``near-empty`` warning is shown but never blocks.


        Every field is derived purely from the source model, the target''s capability
        profile,

        and the fidelity report, so the guard a preview surfaces and the guard the
        export enforces

        agree for the same inputs.'
