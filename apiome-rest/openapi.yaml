        tallies, an error rate, and latency percentiles (p50/p95/p99). ``health``
        (MCAT-17.1) adds the

        recent per-job outcome timeline (newest-first, capped at the timeline window),
        a windowed

        availability percentage, and the endpoint''s live quarantine / backoff state.
        ``tools``

        (MCAT-17.2) adds a per-tool latency & error-rate breakdown over the recent

        :data:`TOOL_LATENCY_WINDOW_DAYS`-day window — p50/p95/p99 and error rate per
        tool, a latency

        distribution, and the endpoint-wide totals. An endpoint with no discovery
        or test history returns

        zero counts, an empty timeline, an empty tool list, and empty (``None``) statistics
        — a ``200``,

        never a ``500``. Returns ``404`` when the endpoint is not the caller''s tenant''s.'
