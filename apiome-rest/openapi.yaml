          - type: string
          - type: 'null'
          title: Media Type
          description: The bundle's primary media type; null for a dry-run.
      additionalProperties: false
      type: object
      required:
      - artifact
      - version_record_id
      - target
      - dry_run
      - fidelity
      - guard
      title: ExportDispatchResponse
      description: 'The dispatch result: resolved coordinates + fidelity envelope
        + emitted artifact (MFX-3.2).'
    ExportDocumentRequest:
      properties:
        artifact:
