openapi: 3.1.0
info:
  title: Apiome REST API
  description: REST API for managing tenants, projects, versions, primitives, classes,
    paths, operations, catalog items, imports, exports, governance, and MCP catalog
    surfaces.
  version: 1.18.0
  contact:
    name: Apiome
    url: https://apiome.dev
  license:
    name: Proprietary
paths:
  /v1/browse/tenants:
    get:
      tags:
      - browse
      summary: List Public Browse Tenants
      operationId: list_public_browse_tenants_v1_browse_tenants_get
      parameters:
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            description: List Public Browse Tenantssearch schema.
          - type: 'null'
            description: List Public Browse Tenantssearch schema.
          description: Case-insensitive substring filter on tenant name and slug.
          title: Search
        description: Case-insensitive substring filter on tenant name and slug.
      - name: sort
        in: query
        required: false
        schema:
          enum:
          - latest
          - name
          - projects
          type: string
          description: 'Sort order: name (default), projects (desc), or latest activity
            (desc).'
          default: name
          title: Sort
        description: 'Sort order: name (default), projects (desc), or latest activity
          (desc).'
      responses:
        '200':
          description: Successful response for list public browse tenants.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowsePublicTenantsResponse'
                description: Response payload for list public browse tenantsresponse200.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
                description: Response payload for list public browse tenantsresponse422.
  /v1/browse/tenants/{tenant_slug}/projects:
    get:
      tags:
      - browse
      summary: List Public Browse Projects
      operationId: list_public_browse_projects_v1_browse_tenants__tenant_slug__projects_get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
          description: Tenant Slug schema.
        description: URL-safe tenant slug that scopes the request.
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            description: List Public Browse Projectssearch schema.
          - type: 'null'
            description: List Public Browse Projectssearch schema.
          description: Case-insensitive substring filter on project slug and name.
          title: Search
        description: Case-insensitive substring filter on project slug and name.
      - name: domain
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            description: List Public Browse Projectsdomain schema.
          - type: 'null'
            description: List Public Browse Projectsdomain schema.
          description: Filter by project metadata domain or domainCategory (case-insensitive).
          title: Domain
        description: Filter by project metadata domain or domainCategory (case-insensitive).
      - name: has_published
        in: query
        required: false
        schema:
          type: boolean
          description: Only include projects with at least one published version (visibility
            rules apply).
          default: false
          title: Has Published
        description: Only include projects with at least one published version (visibility
          rules apply).
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            description: List Public Browse Projectsauthorization schema.
          - type: 'null'
            description: List Public Browse Projectsauthorization schema.
          title: Authorization
          description: Authorization schema.
        description: 'JWT bearer token for authenticated access (``Authorization:
          Bearer <token>``).'
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            description: List Public Browse Projects Xapikey schema.
          - type: 'null'
            description: List Public Browse Projects Xapikey schema.
          title: X-Api-Key
          description: X-Api-Key schema.
        description: Tenant-scoped API key used as an alternative to JWT bearer authentication.
      responses:
        '200':
          description: Successful response for list public browse projects.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowsePublicProjectsResponse'
                description: Response payload for list public browse projectsresponse200.
        '401':
          description: Credentials provided but could not be validated.
        '403':
          description: Credentials provided but not authorized for this tenant.
        '404':
          description: Tenant not found.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
                description: Response payload for list public browse projectsresponse422.
  /v1/browse/tenants/{tenant_slug}/projects/{project_slug}/versions:
    get:
      tags:
      - browse
      summary: List Public Browse Versions
      operationId: list_public_browse_versions_v1_browse_tenants__tenant_slug__projects__project_slug__versions_get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
          description: Tenant Slug schema.
        description: URL-safe tenant slug that scopes the request.
      - name: project_slug
        in: path
        required: true
        schema:
          type: string
          title: Project Slug
          description: Project Slug schema.
        description: URL-safe project slug within the tenant.
      - name: since
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
            description: List Public Browse Versionssince schema.
          - type: 'null'
            description: List Public Browse Versionssince schema.
          description: Include only versions whose published_at is at or after this
            timestamp (ISO 8601).
          title: Since
        description: Include only versions whose published_at is at or after this
          timestamp (ISO 8601).
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            description: List Public Browse Versionsauthorization schema.
          - type: 'null'
            description: List Public Browse Versionsauthorization schema.
          title: Authorization
          description: Authorization schema.
        description: 'JWT bearer token for authenticated access (``Authorization:
          Bearer <token>``).'
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            description: List Public Browse Versions Xapikey schema.
          - type: 'null'
            description: List Public Browse Versions Xapikey schema.
          title: X-Api-Key
          description: X-Api-Key schema.
        description: Tenant-scoped API key used as an alternative to JWT bearer authentication.
      responses:
        '200':
          description: Successful response for list public browse versions.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowsePublicVersionsResponse'
                description: Response payload for list public browse versionsresponse200.
        '401':
          description: Credentials provided but could not be validated.
        '403':
          description: Credentials provided but not authorized for this tenant.
        '404':
          description: Tenant or project not found.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
                description: Response payload for list public browse versionsresponse422.
  /mcp/badge/{tenant}/{slug}.svg:
    get:
      tags:
      - mcp-catalog
      summary: Get Mcp Status Badge
      description: "Render a published endpoint's status badge as a cacheable SVG\
        \ (MCAT-19.3).\n\nResolves the endpoint by ``tenant`` + ``slug`` through the\
        \ public gate, folds the requested\n``metric`` into a badge, and returns it\
        \ as SVG with caching headers. A target that is not a\npublished, public endpoint\
        \ (or does not exist) renders the neutral ``unknown`` badge with a\n``200``\
        \ — never a ``404`` — so the response never reveals whether such an endpoint\
        \ exists.\n\nArgs:\n    tenant: The owning tenant's URL slug.\n    slug: The\
        \ endpoint's tenant-unique catalog slug (the ``.svg`` suffix is part of the\
        \ route).\n    metric: ``grade`` / ``health`` / ``version``; unrecognized\
        \ values normalize to ``grade``.\n    theme: ``light`` / ``dark`` label variant;\
        \ unrecognized values normalize to ``light``.\n    if_none_match: Standard\
        \ conditional-request header; a match yields ``304 Not Modified``.\n\nReturns:\n\
        \    A ``Response`` carrying the SVG (``200``) — or an empty ``304`` — with\
        \ ``ETag`` and\n    ``Cache-Control`` set."
      operationId: get_mcp_status_badge_mcp_badge__tenant___slug__svg_get
      parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
          title: Tenant
          description: Tenant schema.
        description: URL-safe tenant slug that scopes the request.
      - name: slug
        in: path
        required: true
        schema:
          type: string
          title: Slug
          description: Slug schema.
        description: URL-safe resource slug.
      - name: metric
        in: query
        required: false
        schema:
          type: string
          description: 'Which signal to render: ''grade'' (A–F lint grade), ''health''
            (operational label), or ''version'' (server-reported version). Anything
            else falls back to ''grade''.'
          default: grade
          title: Metric
        description: 'Which signal to render: ''grade'' (A–F lint grade), ''health''
          (operational label), or ''version'' (server-reported version). Anything
          else falls back to ''grade''.'
      - name: theme
        in: query
        required: false
        schema:
          type: string
          description: 'Label variant: ''light'' (default) or ''dark'' — tones the
            label to suit the page.'
          default: light
          title: Theme
        description: 'Label variant: ''light'' (default) or ''dark'' — tones the label
          to suit the page.'
      - name: If-None-Match
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            description: Get MCP Status Badge If None Match schema.
          - type: 'null'
            description: Get MCP Status Badge If None Match schema.
          title: If-None-Match
          description: If-None-Match schema.
        description: ETag from a prior response; returns 304 when unchanged.
      responses:
        '200':
          description: Successful response for get mcp status badge.
          content:
            application/json:
              schema:
                description: Response payload for get mcp status badgeresponse200.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
                description: Response payload for get mcp status badgeresponse422.
  /mcp/feed/{tenant}/{slug}:
    get:
      tags:
      - mcp-catalog
      summary: Get Mcp Endpoint Change Feed
      description: "Render one **published** endpoint's change feed (MCAT-19.4).\n\
        \nResolves the endpoint by ``tenant`` + ``slug`` through the public gate and\
        \ renders its recent\nchange history (newest snapshot first) as RSS/Atom/JSON.\
        \ A target that is not a published, public\nendpoint (or does not exist) renders\
        \ an identical **empty** feed with a ``200`` — never a\n``404`` — so the response\
        \ never reveals whether such an endpoint exists, and a private endpoint's\n\
        changes are never disclosed. Breaking changes are flagged in every entry.\n\
        \nArgs:\n    request: The incoming request (used only to build the feed's\
        \ self/home URLs).\n    tenant: The owning tenant's URL slug.\n    slug: The\
        \ endpoint's tenant-unique catalog slug.\n    format: ``rss`` / ``atom`` /\
        \ ``json``; anything else is ``400``.\n    if_none_match: Standard conditional-request\
        \ header; a match yields ``304 Not Modified``.\n\nReturns:\n    A ``Response``\
        \ carrying the feed (``200``) — or an empty ``304`` — with ``ETag`` and\n\
        \    ``Cache-Control`` set."
      operationId: get_mcp_endpoint_change_feed_mcp_feed__tenant___slug__get
      parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
          title: Tenant
          description: Tenant schema.
        description: URL-safe tenant slug that scopes the request.
      - name: slug
        in: path
        required: true
        schema:
          type: string
          title: Slug
          description: Slug schema.
        description: URL-safe resource slug.
      - name: format
        in: query
        required: false
        schema:
          type: string
          description: 'Feed format: ''rss'' (default), ''atom'', or ''json'' (JSON
            Feed 1.1).'
          default: rss
          title: Format
        description: 'Feed format: ''rss'' (default), ''atom'', or ''json'' (JSON
          Feed 1.1).'
      - name: If-None-Match
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            description: Get MCP Endpoint Change Feed If None Match schema.
          - type: 'null'
            description: Get MCP Endpoint Change Feed If None Match schema.
          title: If-None-Match
          description: If-None-Match schema.
        description: ETag from a prior response; returns 304 when unchanged.
      responses:
        '200':
          description: Successful response for get mcp endpoint change feed.
          content:
            application/json:
              schema:
                description: Response payload for get mcp endpoint change feedresponse200.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
                description: Response payload for get mcp endpoint change feedresponse422.
  /mcp/feed/{tenant}:
    get:
      tags:
      - mcp-catalog
      summary: Get Mcp Catalog Change Feed
      description: "Render a tenant's whole **published catalog** change feed (MCAT-19.4).\n\
        \nRenders recent changes across every published, public endpoint the tenant\
        \ owns — a catalog-wide\nactivity stream, most recent first — as RSS/Atom/JSON.\
        \ Private and unpublished endpoints are\nexcluded in SQL, so their changes\
        \ never appear. An unknown or fully-private catalog renders an\nempty feed\
        \ with a ``200``. Breaking changes are flagged in every entry.\n\nArgs:\n\
        \    request: The incoming request (used only to build the feed's self/home\
        \ URLs).\n    tenant: The catalog's tenant slug.\n    format: ``rss`` / ``atom``\
        \ / ``json``; anything else is ``400``.\n    if_none_match: Standard conditional-request\
        \ header; a match yields ``304 Not Modified``.\n\nReturns:\n    A ``Response``\
        \ carrying the feed (``200``) — or an empty ``304`` — with ``ETag`` and\n\
        \    ``Cache-Control`` set."
      operationId: get_mcp_catalog_change_feed_mcp_feed__tenant__get
      parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
          title: Tenant
          description: Tenant schema.
        description: URL-safe tenant slug that scopes the request.
      - name: format
        in: query
        required: false
        schema:
          type: string
          description: 'Feed format: ''rss'' (default), ''atom'', or ''json'' (JSON
            Feed 1.1).'
          default: rss
          title: Format
        description: 'Feed format: ''rss'' (default), ''atom'', or ''json'' (JSON
          Feed 1.1).'
      - name: If-None-Match
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            description: Get MCP Catalog Change Feed If None Match schema.
          - type: 'null'
            description: Get MCP Catalog Change Feed If None Match schema.
          title: If-None-Match
          description: If-None-Match schema.
        description: ETag from a prior response; returns 304 when unchanged.
      responses:
        '200':
          description: Successful response for get mcp catalog change feed.
          content:
            application/json:
              schema:
                description: Response payload for get mcp catalog change feedresponse200.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
                description: Response payload for get mcp catalog change feedresponse422.
  /v1/browse/tenants/{tenant_slug}/projects/{project_slug}/versions/{version_slug}/export/targets:
    get:
      tags:
      - browse
      summary: List export targets for a published public version (no auth)
      description: For the published public version identified by the slugs, enumerate
        every registered export target (descriptor + capability profile + options)
        with a cheap per-target fidelity badge (tier + preserved-%). The anonymous
        counterpart of ``GET /v1/export/{tenant_slug}/targets``; drives the public
        export dialog's target cards and fidelity warning (MFX-7.1).
      operationId: list_public_export_targets_v1_browse_tenants__tenant_slug__projects__project_slug__versions__version_slug__export_targets_get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
          description: Tenant Slug schema.
        description: URL-safe tenant slug that scopes the request.
      - name: project_slug
        in: path
        required: true
        schema:
          type: string
          title: Project Slug
          description: Project Slug schema.
        description: URL-safe project slug within the tenant.
      - name: version_slug
        in: path
        required: true
        schema:
          type: string
          title: Version Slug
          description: Version Slug schema.
        description: Semantic version label or version slug (for example ``1.0.0``).
      responses:
        '200':
          description: Successful response for list export targets for a published
            public version (no auth).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicExportTargetsResponse'
                description: Response payload for listexporttargetsforapublishedpublicversresponse200.
        '404':
          description: No published public version matches the slugs (private, draft,
            and unknown versions are indistinguishable).
        '429':
          description: Public export rate limit exceeded (MFX-7.3).
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
                description: Response payload for listexporttargetsforapublishedpublicversresponse422.
  /v1/browse/tenants/{tenant_slug}/projects/{project_slug}/versions/{version_slug}/export/preview:
    post:
      tags:
      - browse
      summary: Preview export fidelity for a published public version (no auth)
      description: Compute the full fidelity report for exporting the published public
        version to one target — the per-construct LossinessReport, the user-facing
        advisory (MFX-2.4), and the tier summary — **without producing the artifact**.
        The anonymous counterpart of ``POST /v1/export/{tenant_slug}/preview``; backs
        the public fidelity advisory (MFX-7.2).
      operationId: preview_public_export_fidelity_v1_browse_tenants__tenant_slug__projects__project_slug__versions__version_slug__export_preview_post
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
          description: Tenant Slug schema.
        description: URL-safe tenant slug that scopes the request.
      - name: project_slug
        in: path
        required: true
        schema:
          type: string
          title: Project Slug
          description: Project Slug schema.
        description: URL-safe project slug within the tenant.
      - name: version_slug
        in: path
        required: true
        schema:
          type: string
          title: Version Slug
          description: Version Slug schema.
        description: Semantic version label or version slug (for example ``1.0.0``).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicExportPreviewRequest'
              description: Request body for previewexportfidelityforapublishedpublicrequest.
        description: Request body for preview export fidelity for a published public
          version (no auth).
      responses:
        '200':
          description: Successful response for preview export fidelity for a published
            public version (no auth).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicExportPreviewResponse'
                description: Response payload for previewexportfidelityforapublishedpublicresponse200.
        '404':
          description: No published public version matches the slugs (private, draft,
            and unknown versions are indistinguishable).
        '429':
          description: Public export rate limit exceeded (MFX-7.3).
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
                description: Response payload for previewexportfidelityforapublishedpublicresponse422.
  /v1/browse/tenants/{tenant_slug}/projects/{project_slug}/versions/{version_slug}/export/document:
    post:
      tags:
      - browse
      summary: Emit the export document for a published public version (no auth)
      description: 'Emit the published public version to one ``target`` through the
        Emitter SPI and return the document itself — JSON by default, YAML when ``Accept:
        application/yaml`` is sent — as a download. The anonymous counterpart of ``POST
        /v1/export/{tenant_slug}/document``. Strictly read-only: no field-identity
        state is persisted for anonymous exports.'
      operationId: emit_public_export_document_v1_browse_tenants__tenant_slug__projects__project_slug__versions__version_slug__export_document_post
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
          description: Tenant Slug schema.
        description: URL-safe tenant slug that scopes the request.
      - name: project_slug
        in: path
        required: true
        schema:
          type: string
          title: Project Slug
          description: Project Slug schema.
        description: URL-safe project slug within the tenant.
      - name: version_slug
        in: path
        required: true
        schema:
          type: string
          title: Version Slug
          description: Version Slug schema.
        description: Semantic version label or version slug (for example ``1.0.0``).
      - name: accept
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            description: Emittheexportdocumentforapublishedpublicaccept schema.
          - type: 'null'
            description: Emittheexportdocumentforapublishedpublicaccept schema.
          title: Accept
          description: Accept schema.
        description: Requested response content type (``Accept`` header).
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicExportDocumentRequest'
              description: Request body for emittheexportdocumentforapublishedpublicrequest.
        description: Request body for emit the export document for a published public
          version (no auth).
      responses:
        '200':
          description: Successful response for emit the export document for a published
            public version (no auth).
        '404':
          description: No published public version matches the slugs (private, draft,
            and unknown versions are indistinguishable).
        '413':
          description: Emitted document exceeds the public download size cap (MFX-7.3).
        '429':
          description: Public export rate limit exceeded (MFX-7.3).
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
                description: Response payload for emittheexportdocumentforapublishedpublicresponse422.
