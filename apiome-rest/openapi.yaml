components:
  schemas:
    ApiParadigm:
      type: string
      enum:
      - rest
      - rpc
      - event
      - graph
      - data_schema
      title: ApiParadigm
      description: 'The high-level interaction style a format belongs to.


        A format declares exactly one paradigm; it selects which canonical fields

        are load-bearing (for example ``channels`` matter for ``EVENT`` but not for

        ``REST``) and drives browse/search facets.'
    Body_start_spec_import_multipart_v1_tenants__tenant_slug__imports_upload_post:
      properties:
        file:
          type: string
          format: binary
          title: File
          description: Raw specification file bytes.
        metadata:
          type: string
          title: Metadata
          description: JSON string matching SpecImportStartMetadata (project, version,
            source_kind, options).
      type: object
      required:
      - file
      - metadata
      title: Body_start_spec_import_multipart_v1_tenants__tenant_slug__imports_upload_post
    BrowseDirectoryStats:
      properties:
        tenant_count:
          type: integer
          title: Tenant Count
        project_count:
          type: integer
          title: Project Count
        version_count:
          type: integer
          title: Version Count
      type: object
      required:
      - tenant_count
      - project_count
      - version_count
      title: BrowseDirectoryStats
      description: Aggregate counts for published public specs (browse directory home).
    BrowsePublicProjectRow:
      properties:
        slug:
          type: string
          title: Slug
        name:
          type: string
          title: Name
        domain:
          type: string
          title: Domain
        published_versions:
          type: integer
          title: Published Versions
        latest_version:
          anyOf:
          - type: string
          - type: 'null'
          title: Latest Version
        latest_published_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Latest Published At
      type: object
      required:
      - slug
      - name
      - domain
      - published_versions
      title: BrowsePublicProjectRow
      description: One project row for public browse (per tenant).
    BrowsePublicProjectsResponse:
      properties:
        tenant_slug:
          type: string
          title: Tenant Slug
        tenant_name:
          type: string
          title: Tenant Name
        projects:
          items:
            $ref: '#/components/schemas/BrowsePublicProjectRow'
