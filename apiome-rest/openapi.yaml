          title: Version
          description: Revision UUID, version label (``1.0.0``), or null for the latest
            revision.
        target:
          type: string
          title: Target
          description: Target emitter key (``openapi``) or format key (``openapi-3.1``).
        options:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Options
          description: Per-target emit options (MFX-1.4); null or empty applies the
            target defaults.
        include_content:
          type: boolean
          title: Include Content
          description: When true, return the emitted artifact inline (under the size
            cap) so the Monaco viewer (MFX-43.x) can render the preview from this
            same call; the bytes are still discarded server-side.
          default: true
        min_severity:
          $ref: '#/components/schemas/LossinessSeverity'
          description: Lowest loss severity that raises the advisory (MFX-2.4); does
            not affect the report or counts.
          default: info
      additionalProperties: false
      type: object
      required:
      - artifact
      - target
      title: ExportVerifyRequest
      description: 'A one-call verify request: source revision + chosen target + options
        (MFX-42.5).'
    ExportVerifyResponse:
      properties:
        artifact:
          type: string
          title: Artifact
          description: The artifact (project) id the verify was computed for.
        version:
          anyOf:
          - type: string
          - type: 'null'
          title: Version
          description: The version selector as requested (label, UUID, or null).
        version_record_id:
          type: string
          title: Version Record Id
          description: The resolved revision (``versions.id``).
        version_label:
          anyOf:
          - type: string
          - type: 'null'
          title: Version Label
          description: The resolved revision's version label (e.g. ``1.0.0``).
        target:
          type: string
          title: Target
          description: The resolved target format key (e.g. ``openapi-3.1``).
        fidelity:
