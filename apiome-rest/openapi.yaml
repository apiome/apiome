        The heavyweight half of the surface, returned by ``POST /export/preview``
        and *embedded

        verbatim in an export job''s result* (MFX-3.1/3.2): the target descriptor,
        the coarse

        :class:`TargetFidelity` summary, the whole :class:`~app.lossiness.LossinessReport`

        (per-construct detail), and the user-facing :class:`~app.fidelity_advisory.ExportAdvisory`.

        Because every field is derived purely from the prediction engine, a preview
        and the export

        it previews carry identical fidelity.'
