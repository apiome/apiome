      title: McpInsightCatalogResponse
      description: 'Response envelope for the tenant-wide catalog insight roll-up
        (feeds 18.1).


        Spans every live endpoint the caller''s tenant owns: how many there are, how
        many are published

        / discovered, the per-kind capability ``type_counts`` summed across every
        endpoint''s current

        surface, the ``average_score`` over scored current versions, and the A-F ``grade_distribution``.


        The composition breakdowns power the catalog analytics dashboard''s tiles:
        ``category_distribution``

