        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Endpoint Id
          description: Endpoint Id schema.
        description: MCP endpoint identifier.
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            description: Test MCP Endpoint Capabilityauthorization schema.
          - type: 'null'
            description: Test MCP Endpoint Capabilityauthorization schema.
          title: Authorization
          description: Authorization schema.
        description: 'JWT bearer token for authenticated access (``Authorization:
          Bearer <token>``).'
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            description: Test MCP Endpoint Capability Xapikey schema.
          - type: 'null'
            description: Test MCP Endpoint Capability Xapikey schema.
          title: X-Api-Key
          description: X-Api-Key schema.
        description: Tenant-scoped API key used as an alternative to JWT bearer authentication.
      requestBody:
