        available:
          type: boolean
          title: Available
          description: Whether this emitter can run in the current runtime.
          default: true
          example: false
        unavailable_reason:
          anyOf:
          - type: string
            description: Emitter Descriptor schema.
          - type: 'null'
            description: Emitter Descriptor schema.
