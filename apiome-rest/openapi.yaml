          title: Format
        description: 'Inventory format: ''csv'' or ''json''.'
      - name: scope
        in: query
        required: false
        schema:
          type: string
          description: '''all'' exports the tenant''s full catalog; ''public'' exports
            only published endpoints (the public-directory variant).'
