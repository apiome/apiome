  /v1/ops/toolchain:
    get:
      tags:
      - ops
      summary: Ops Toolchain
      description: 'Bundled toolchain packaging & availability + sandbox posture.
        Platform-admin only.


        Reports every declared external tool (buf, tsp, smithy, drafter, amf, asyncapi,
        rover),

        its pinned version, and whether its binary resolves in this runtime — the
        "format

        unavailable" signal a missing tool produces (MFI-5.2). With ``?verify=true``
        each

        *available* tool is additionally invoked with its version probe to confirm
        it actually

        runs. The ``sandbox`` block reports the active security/resource posture (MFI-5.3)
        every

        tool subprocess runs under (no-network default, rlimit clamps, input/output
        caps).'
      operationId: ops_toolchain_v1_ops_toolchain_get
      parameters:
      - name: verify
        in: query
        required: false
        schema:
          type: boolean
          description: Also invoke each available tool's version probe to confirm
            it runs (slower — spawns one subprocess per available tool).
          default: false
          title: Verify
        description: Also invoke each available tool's version probe to confirm it
          runs (slower — spawns one subprocess per available tool).
      - name: tenant_slug
        in: query
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: authorization
        in: header
        required: false
        schema:
