        passed as

        ``base``, so ``added``/``removed`` always read relative to the older surface.
        The same

        version on both sides yields an empty diff with ``fingerprint_changed = False``.
        404 when

        the endpoint — or either version under it — is not the caller''s tenant''s.'
      operationId: compare_mcp_endpoint_versions_v1_mcp__tenant_slug__endpoints__endpoint_id__versions_compare_get
