  /v1/versions/{tenant_slug}/{project_id}/{version_record_id}:
    get:
      tags:
      - versions
      summary: Get Version
      description: 'Get a specific version by ID.


        Supports authentication via JWT token or API key.


        Successor resolution (#749): when ``successorResolution`` is ``resolve`` or
        ``redirect``, follows

        ``metadata.successorRevisionId`` (#748) within the project until a revision
        has no successor, hits a

        protected branch tip / protected tag target (#504), or errors. Loops return
        409 ``SUCCESSOR_CYCLE``.


        Pull payload selection (#2591): ``includeSections`` / ``excludeSections``
        reduce JSON size for CI;

        the strong ETag still identifies the revision only (same as full body, #2568).


        Delta pull (#2592): ``sinceRevisionId`` adds ``schemaPullDelta`` (changed
        schema entities only).'
      operationId: get_version_v1_versions__tenant_slug___project_id___version_record_id__get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: project_id
        in: path
        required: true
        schema:
          type: string
          title: Project Id
      - name: version_record_id
        in: path
        required: true
        schema:
          type: string
          title: Version Record Id
      - name: successorResolution
        in: query
        required: false
        schema:
          enum:
          - none
          - resolve
          - redirect
          type: string
          description: 'none: return the requested revision only. resolve: follow
            metadata.successorRevisionId (same project, #748); JSON body is the final
            revision; see X-Apiome-* response headers. redirect: HTTP 307 to this
            path with the final revision id and successorResolution=none.'
          default: none
          title: Successorresolution
        description: 'none: return the requested revision only. resolve: follow metadata.successorRevisionId
          (same project, #748); JSON body is the final revision; see X-Apiome-* response
          headers. redirect: HTTP 307 to this path with the final revision id and
          successorResolution=none.'
      - name: auditSuccessorResolution
        in: query
        required: false
        schema:
          type: boolean
          description: When true, emit version_protection_audit for successor resolution
            (#749).
          default: false
          title: Auditsuccessorresolution
        description: When true, emit version_protection_audit for successor resolution
          (#749).
      - name: includeSections
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: 'Comma-separated pull payload sections to include (#2591).
            Always includes id, project_id, and version_id. Mutually exclusive with
            excludeSections. Sections: core, commit, publish, lineage, governance,
            creator, project, timestamps.'
          title: Includesections
        description: 'Comma-separated pull payload sections to include (#2591). Always
          includes id, project_id, and version_id. Mutually exclusive with excludeSections.
          Sections: core, commit, publish, lineage, governance, creator, project,
          timestamps.'
      - name: excludeSections
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Comma-separated sections to omit from the pull body (#2591).
            Core identifiers cannot be removed. Mutually exclusive with includeSections.
          title: Excludesections
        description: Comma-separated sections to omit from the pull body (#2591).
          Core identifiers cannot be removed. Mutually exclusive with includeSections.
      - name: sinceRevisionId
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: When set, the JSON body includes schemaPullDelta with changed
            OpenAPI components.schemas entities since this revision (#2592). Must
            be the resolved head revision or an ancestor in the revision parent graph.
          title: Sincerevisionid
        description: When set, the JSON body includes schemaPullDelta with changed
          OpenAPI components.schemas entities since this revision (#2592). Must be
          the resolved head revision or an ancestor in the revision parent graph.
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Full VersionSchema, or JSON with includeSections/excludeSections
            (#2591), or JSON with schemaPullDelta when sinceRevisionId is set (#2592).
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VersionSchema'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
