            the root document is auto-detected (or chosen via ``archive_root``).
        archive_root:
          anyOf:
          - type: string
          - type: 'null'
          title: Archive Root
          description: Explicit module-relative root path inside an uploaded archive.
      type: object
      title: DetectFormatRequest
      description: A document (plus optional hints) to auto-detect the format of.
    DetectFormatResponse:
      properties:
        matched:
