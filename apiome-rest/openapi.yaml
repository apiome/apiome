    get:
      tags:
      - mcp-catalog
      summary: Get Mcp Conformance Rules
      description: 'Return the MCP conformance rule catalog and the profiles that
        select from it.


        Every rule cites the MCP specification revision it derives from and a resolvable
        source

        reference, so any finding can be traced back to a normative statement (CLX-3.1
