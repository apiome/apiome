      - tags
      title: BrowsePublicVersionRow
      description: One published version row for public browse (per project).
    BrowsePublicVersionsResponse:
      properties:
        tenant_slug:
          type: string
          title: Tenant Slug
          description: URL-safe tenant slug used in path parameters.
          example: acme
        tenant_name:
          type: string
          title: Tenant Name
          description: Tenant Name.
          example: Example
        project_slug:
          type: string
          title: Project Slug
          description: Project Slug.
          example: example-resource
        project_name:
          type: string
          title: Project Name
          description: Project Name.
          example: Example
        versions:
          items:
            $ref: '#/components/schemas/BrowsePublicVersionRow'
          type: array
          title: Versions
          description: Versions.
          maxItems: 1000
        filtered_count:
          type: integer
          title: Filtered Count
          description: Number of filtered.
          example: 1
      type: object
      required:
      - tenant_slug
      - tenant_name
      - project_slug
      - project_name
      - versions
      - filtered_count
      title: BrowsePublicVersionsResponse
      description: Published versions for browse parity (anonymous public slice or
        member-authenticated view).
    CapabilityProfile:
      properties:
        operations:
          type: boolean
          title: Operations
          description: HTTP/RPC operations (services, routes, bindings).
          default: false
          example: false
        events:
          type: boolean
          title: Events
          description: Event channels, pub/sub actions, and async message flows.
          default: false
          example: false
        unions:
          type: boolean
          title: Unions
          description: Discriminated unions / one-of type alternatives.
          default: false
          example: false
        nullability:
          type: boolean
          title: Nullability
          description: Explicit nullable / optional member semantics.
          default: false
          example: false
        constraints:
          type: boolean
          title: Constraints
          description: Validation facets (min/max, pattern, format, enum).
          default: false
          example: false
        field_identity:
          type: boolean
          title: Field Identity
          description: Stable field identifiers (protobuf field numbers, Avro names).
          default: false
          example: false
      type: object
      title: CapabilityProfile
      description: 'Static declaration of which canonical constructs a target can
        represent.


        Consumed by the fidelity engine (MFX-EPIC-2) to predict loss *before* emit.

        Each flag is ``True`` when the target can carry the construct faithfully (not

        merely approximate or synthesize a stand-in).'
    CapabilityRegistrySnapshot:
      properties:
        version:
          type: string
          title: Version
          description: The registry contract version (``REGISTRY_VERSION``).
          example: 1.0.0
        review_date:
          type: string
          title: Review Date
          description: When the registry links/explanations were last reviewed.
          example: example
        reason_codes:
          items:
            type: string
          type: array
          title: Reason Codes
          description: The canonical set of valid reason-code strings, sorted. Contract
            tests reject any reason code outside this set.
          maxItems: 1000
        reasons:
          items:
            $ref: '#/components/schemas/ReasonExplanation'
          type: array
          title: Reasons
          description: The reviewed explanation for each reason code, in taxonomy
            order.
          maxItems: 1000
        destinations:
          items:
            $ref: '#/components/schemas/DestinationCapability'
          type: array
          title: Destinations
          description: One capability entry per registered destination, in key order.
          maxItems: 1000
      additionalProperties: false
      type: object
      required:
      - version
      - review_date
      - reason_codes
      - reasons
      - destinations
      title: CapabilityRegistrySnapshot
      description: 'The full, deterministic registry view exposed to the REST contract
        + UI (EFP-1.2).


        Carries the :attr:`version`, the reviewed :class:`ReasonExplanation` for every
        reason

        code (the drawer''s honest wording), and a :class:`DestinationCapability`
        for every

        runtime-available emitter, all in a stable order. Because it is derived from
        the

        static registry and the (deterministic) emitter registry, identical inputs
        yield an

        identical snapshot — safe to cache and to mirror in a TypeScript contract.'
    CatalogConversionRef:
      properties:
        projectId:
          type: string
          title: Projectid
          description: Id of the publishable Project this item was converted into.
          example: example
        projectName:
          anyOf:
          - type: string
            description: Catalog Conversion Ref schema.
          - type: 'null'
            description: Catalog Conversion Ref schema.
          title: Projectname
          description: Name of the converted Project (None if it was deleted).
        projectSlug:
          anyOf:
          - type: string
            description: Catalog Conversion Ref schema.
          - type: 'null'
            description: Catalog Conversion Ref schema.
          title: Projectslug
          description: Slug of the converted Project (None if it was deleted).
        projectDeleted:
          type: boolean
          title: Projectdeleted
          description: True when the converted Project has since been deleted.
          default: false
          example: false
        versionId:
          anyOf:
          - type: string
            description: Catalog Conversion Ref schema.
          - type: 'null'
            description: Catalog Conversion Ref schema.
          title: Versionid
          description: Semantic version label of the produced revision (e.g. '1.0.0').
        versionRecordId:
          anyOf:
          - type: string
            description: Catalog Conversion Ref schema.
          - type: 'null'
            description: Catalog Conversion Ref schema.
          title: Versionrecordid
          description: Row id (versions.id) of the produced revision.
        reconverted:
          type: boolean
          title: Reconverted
          description: True when the latest conversion superseded a prior conversion
            of the source.
          default: false
          example: false
        convertedAt:
          anyOf:
          - type: string
            format: date-time
            description: Catalog Conversion Ref schema.
          - type: string
            description: Catalog Conversion Ref schema.
          - type: 'null'
            description: Catalog Conversion Ref schema.
          title: Convertedat
          description: When the latest conversion was committed.
        fidelityGrade:
          anyOf:
          - type: string
            description: Catalog Conversion Ref schema.
          - type: 'null'
            description: Catalog Conversion Ref schema.
          title: Fidelitygrade
          description: A-F fidelity grade the conversion achieved (MFI-22.3).
        fidelityTier:
          anyOf:
          - type: string
            description: Catalog Conversion Ref schema.
          - type: 'null'
            description: Catalog Conversion Ref schema.
          title: Fidelitytier
          description: Coarse fidelity tier (high/medium/low) of the conversion.
      type: object
      required:
      - projectId
      title: CatalogConversionRef
      description: 'The latest catalog → OpenAPI conversion of a catalog item (MFI-23.11),
        or absent when it has

        never been converted.


        Projected from the ``apiome.conversion_provenance`` ledger (MFI-22.5): once
        a catalog item has been

        converted it carries a back-link to the publishable **Project** the convert
        job produced, so the

        Catalog card/detail can show **"Converted → {project}"**. ``reconverted``
        is ``True`` when the

        latest conversion superseded a prior one (the source changed and was re-converted,
        appending a new

        version rather than minting a duplicate Project). ``projectName`` / ``projectSlug``
        come from the

        target Project row (``None`` if it was since deleted, which ``projectDeleted``
        flags), so the UI can

        render a friendly label and decide whether the link is still live.'
    CatalogItemDetailSchema:
      properties:
        id:
          type: string
          title: Id
          description: Stable resource identifier.
          example: res_01h2xcejqtf3fz5y5j0v8k9m2p
        tenant_id:
          type: string
          title: Tenant Id
          description: Tenant that owns the resource.
          example: ten_01h2xcejqtf3fz5y5j0v8k9m2p
        creator_id:
          anyOf:
          - type: string
            description: Catalog Item Detail schema.
          - type: 'null'
            description: Catalog Item Detail schema.
          title: Creator Id
          description: Creator ID.
        name:
          type: string
          title: Name
          description: Human-readable name.
          example: Pet
        description:
          anyOf:
          - type: string
            description: Catalog Item Detail schema.
          - type: 'null'
            description: Catalog Item Detail schema.
          title: Description
          description: Free-text description.
        slug:
          type: string
          title: Slug
          description: URL-safe identifier.
          example: pet-store
        enabled:
          type: boolean
          title: Enabled
          default: true
          description: Whether the resource is active.
          example: true
        deleted_at:
          anyOf:
          - type: string
            format: date-time
            description: Catalog Item Detail schema.
          - type: string
            description: Catalog Item Detail schema.
          - type: 'null'
            description: Catalog Item Detail schema.
          title: Deleted At
          description: Deleted At timestamp (ISO 8601).
        metadata:
          anyOf:
          - additionalProperties: true
            type: object
            description: Catalog Item Detail schema.
          - type: 'null'
            description: Catalog Item Detail schema.
          title: Metadata
          description: Additional JSON metadata bag.
        qualityScore:
          anyOf:
          - type: integer
            description: Catalog Item Detail schema.
          - type: 'null'
            description: Catalog Item Detail schema.
