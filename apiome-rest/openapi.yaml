  /v1/mcp/{tenant_slug}/endpoints:export:
    get:
      tags:
      - mcp-catalog
      summary: Export Mcp Catalog Inventory
      description: "Export the tenant's whole MCP catalog as streamed CSV or JSON\
        \ data (MCAT-19.2).\n\nSerializes every cataloged endpoint into a flat inventory\
        \ row — id, name, host, transport,\ncategory, visibility, published flag,\
        \ current grade/score, per-kind capability counts (and their\ntotal), last\
        \ discovery status/time, and a derived health label — as **CSV** (RFC-4180\
        \ escaped)\nor a **JSON** wrapper whose ``endpoints`` array carries the same\
        \ fields. The catalog is walked one\nbounded keyset page at a time and the\
        \ body is streamed, so a large catalog exports without\nloading every row\
        \ into memory.\n\nLike every catalog route, scoping comes from the validated\
        \ token's ``tenant_id`` — never the URL\nslug — so the export only ever contains\
        \ the caller's own catalog. ``scope=public`` restricts the\nexport to published\
        \ endpoints (the published-only variant a public directory would show). Only\n\
        each endpoint's *host* is exported; the stored URL, which may embed a credential,\
        \ never appears.\n\nArgs:\n    tenant_slug: Informational; scoping comes from\
        \ the validated token's tenant.\n    format: ``csv`` or ``json`` (``400``\
        \ on anything else).\n    scope: ``all`` (full catalog) or ``public`` (published-only);\
        \ ``400`` on anything else.\n    auth_data: The validated caller identity\
        \ (also what enforces tenant scoping).\n\nReturns:\n    A ``StreamingResponse``\
        \ carrying the rendered inventory with the right ``Content-Type`` and\n  \
        \  an ``attachment`` ``Content-Disposition`` filename."
      operationId: export_mcp_catalog_inventory_v1_mcp__tenant_slug__endpoints_export_get
