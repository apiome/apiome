          type: integer
          title: Tool Count
          default: 0
        annotated_tools:
          type: integer
          title: Annotated Tools
          default: 0
        read_only_hint:
          type: integer
          title: Read Only Hint
          default: 0
        destructive_hint:
          type: integer
          title: Destructive Hint
          default: 0
        idempotent_hint:
