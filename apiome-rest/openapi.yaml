  /v1/mcp/{tenant_slug}/capabilities/search:
    get:
      tags:
      - mcp-catalog
      summary: Cross Server Capability Search
      description: 'Cross-server capability search — keyword + semantic, grouped by
        owning server (MCAT-21.2).


        Answers "which servers offer a capability like X?" across the caller''s catalog.
        **Keyword**

        matches use the V127 capability-item ``tsvector`` GIN index (``websearch_to_tsquery``).
        When

        ``APIOME_MCP_SIMILARITY_EMBEDDINGS_ENABLED`` is on and the Ollama embedding
        service is

        reachable, **semantic** matches also rank stored per-item embeddings (V149)
        by cosine

        similarity. Each distinct capability appears once with ``match_source`` ``keyword``,

        ``semantic``, or ``both``.


        **Ranking** (MCAT-9.7 / MCAT-21.2): per-item ``relevance`` is ``max(fts_rank,

        cosine_similarity)``; server groups sort by their best item relevance, then
        letter grade (A

        first, ungraded last), then score, then endpoint name; capabilities within
        a group sort by

        relevance desc, then ordinal. ``visibility`` and tenant scoping are enforced
        like the flat

        search route — only the caller''s own catalog is searched. An empty or whitespace-only
        query, or

        a query that matches nothing, returns ``groups: []`` (not an error).'
      operationId: cross_server_capability_search_v1_mcp__tenant_slug__capabilities_search_get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: q
        in: query
        required: true
        schema:
          type: string
          minLength: 1
          description: Free-text query (websearch syntax for keyword matches; also
            embedded for semantic).
          title: Q
        description: Free-text query (websearch syntax for keyword matches; also embedded
          for semantic).
      - name: scope
        in: query
        required: false
        schema:
          anyOf:
          - enum:
            - tool
            - resource
            - resource_template
            - prompt
            - endpoint
            type: string
          - type: 'null'
          description: Restrict to one capability kind (tool/resource/resource_template/prompt).
            Omit to search all capability kinds.
          title: Scope
        description: Restrict to one capability kind (tool/resource/resource_template/prompt).
