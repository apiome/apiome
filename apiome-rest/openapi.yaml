openapi: 3.1.0
info:
  title: Apiome REST API
  description: REST API for serving OpenAPI specifications from the Apiome database
  version: 1.0.65
paths:
  /v1/browse/tenants:
    get:
      tags:
      - browse
      summary: List Public Browse Tenants
      operationId: list_public_browse_tenants_v1_browse_tenants_get
      parameters:
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Case-insensitive substring filter on tenant name and slug.
          title: Search
        description: Case-insensitive substring filter on tenant name and slug.
      - name: sort
        in: query
        required: false
        schema:
          enum:
          - latest
          - name
          - projects
          type: string
          description: 'Sort order: name (default), projects (desc), or latest activity
            (desc).'
          default: name
          title: Sort
        description: 'Sort order: name (default), projects (desc), or latest activity
          (desc).'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowsePublicTenantsResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/browse/tenants/{tenant_slug}/projects:
    get:
      tags:
      - browse
      summary: List Public Browse Projects
      operationId: list_public_browse_projects_v1_browse_tenants__tenant_slug__projects_get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: search
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Case-insensitive substring filter on project slug and name.
          title: Search
        description: Case-insensitive substring filter on project slug and name.
      - name: domain
        in: query
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          description: Filter by project metadata domain or domainCategory (case-insensitive).
          title: Domain
        description: Filter by project metadata domain or domainCategory (case-insensitive).
      - name: has_published
        in: query
        required: false
        schema:
          type: boolean
          description: Only include projects with at least one published version (visibility
            rules apply).
          default: false
          title: Has Published
        description: Only include projects with at least one published version (visibility
          rules apply).
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowsePublicProjectsResponse'
        '401':
          description: Credentials provided but could not be validated.
        '403':
          description: Credentials provided but not authorized for this tenant.
        '404':
          description: Tenant not found.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/browse/tenants/{tenant_slug}/projects/{project_slug}/versions:
    get:
      tags:
      - browse
      summary: List Public Browse Versions
      operationId: list_public_browse_versions_v1_browse_tenants__tenant_slug__projects__project_slug__versions_get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: project_slug
        in: path
        required: true
        schema:
          type: string
          title: Project Slug
      - name: since
        in: query
        required: false
        schema:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          description: Include only versions whose published_at is at or after this
            timestamp (ISO 8601).
          title: Since
        description: Include only versions whose published_at is at or after this
          timestamp (ISO 8601).
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BrowsePublicVersionsResponse'
        '401':
          description: Credentials provided but could not be validated.
        '403':
          description: Credentials provided but not authorized for this tenant.
        '404':
          description: Tenant or project not found.
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /mcp/badge/{tenant}/{slug}.svg:
    get:
      tags:
      - mcp-catalog
      summary: Get Mcp Status Badge
      description: "Render a published endpoint's status badge as a cacheable SVG\
        \ (MCAT-19.3).\n\nResolves the endpoint by ``tenant`` + ``slug`` through the\
        \ public gate, folds the requested\n``metric`` into a badge, and returns it\
        \ as SVG with caching headers. A target that is not a\npublished, public endpoint\
        \ (or does not exist) renders the neutral ``unknown`` badge with a\n``200``\
        \ — never a ``404`` — so the response never reveals whether such an endpoint\
        \ exists.\n\nArgs:\n    tenant: The owning tenant's URL slug.\n    slug: The\
        \ endpoint's tenant-unique catalog slug (the ``.svg`` suffix is part of the\
        \ route).\n    metric: ``grade`` / ``health`` / ``version``; unrecognized\
        \ values normalize to ``grade``.\n    theme: ``light`` / ``dark`` label variant;\
        \ unrecognized values normalize to ``light``.\n    if_none_match: Standard\
        \ conditional-request header; a match yields ``304 Not Modified``.\n\nReturns:\n\
        \    A ``Response`` carrying the SVG (``200``) — or an empty ``304`` — with\
        \ ``ETag`` and\n    ``Cache-Control`` set."
      operationId: get_mcp_status_badge_mcp_badge__tenant___slug__svg_get
      parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
          title: Tenant
      - name: slug
        in: path
        required: true
        schema:
          type: string
          title: Slug
      - name: metric
        in: query
        required: false
        schema:
          type: string
          description: 'Which signal to render: ''grade'' (A–F lint grade), ''health''
            (operational label), or ''version'' (server-reported version). Anything
            else falls back to ''grade''.'
          default: grade
          title: Metric
        description: 'Which signal to render: ''grade'' (A–F lint grade), ''health''
          (operational label), or ''version'' (server-reported version). Anything
          else falls back to ''grade''.'
      - name: theme
        in: query
        required: false
        schema:
          type: string
          description: 'Label variant: ''light'' (default) or ''dark'' — tones the
            label to suit the page.'
          default: light
          title: Theme
        description: 'Label variant: ''light'' (default) or ''dark'' — tones the label
          to suit the page.'
      - name: If-None-Match
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: If-None-Match
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /mcp/feed/{tenant}/{slug}:
    get:
      tags:
      - mcp-catalog
      summary: Get Mcp Endpoint Change Feed
      description: "Render one **published** endpoint's change feed (MCAT-19.4).\n\
        \nResolves the endpoint by ``tenant`` + ``slug`` through the public gate and\
        \ renders its recent\nchange history (newest snapshot first) as RSS/Atom/JSON.\
        \ A target that is not a published, public\nendpoint (or does not exist) renders\
        \ an identical **empty** feed with a ``200`` — never a\n``404`` — so the response\
        \ never reveals whether such an endpoint exists, and a private endpoint's\n\
        changes are never disclosed. Breaking changes are flagged in every entry.\n\
        \nArgs:\n    request: The incoming request (used only to build the feed's\
        \ self/home URLs).\n    tenant: The owning tenant's URL slug.\n    slug: The\
        \ endpoint's tenant-unique catalog slug.\n    format: ``rss`` / ``atom`` /\
        \ ``json``; anything else is ``400``.\n    if_none_match: Standard conditional-request\
        \ header; a match yields ``304 Not Modified``.\n\nReturns:\n    A ``Response``\
        \ carrying the feed (``200``) — or an empty ``304`` — with ``ETag`` and\n\
        \    ``Cache-Control`` set."
      operationId: get_mcp_endpoint_change_feed_mcp_feed__tenant___slug__get
      parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
          title: Tenant
      - name: slug
        in: path
        required: true
        schema:
          type: string
          title: Slug
      - name: format
        in: query
        required: false
        schema:
          type: string
          description: 'Feed format: ''rss'' (default), ''atom'', or ''json'' (JSON
            Feed 1.1).'
          default: rss
          title: Format
        description: 'Feed format: ''rss'' (default), ''atom'', or ''json'' (JSON
          Feed 1.1).'
      - name: If-None-Match
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: If-None-Match
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /mcp/feed/{tenant}:
    get:
      tags:
      - mcp-catalog
      summary: Get Mcp Catalog Change Feed
      description: "Render a tenant's whole **published catalog** change feed (MCAT-19.4).\n\
        \nRenders recent changes across every published, public endpoint the tenant\
        \ owns — a catalog-wide\nactivity stream, most recent first — as RSS/Atom/JSON.\
        \ Private and unpublished endpoints are\nexcluded in SQL, so their changes\
        \ never appear. An unknown or fully-private catalog renders an\nempty feed\
        \ with a ``200``. Breaking changes are flagged in every entry.\n\nArgs:\n\
        \    request: The incoming request (used only to build the feed's self/home\
        \ URLs).\n    tenant: The catalog's tenant slug.\n    format: ``rss`` / ``atom``\
        \ / ``json``; anything else is ``400``.\n    if_none_match: Standard conditional-request\
        \ header; a match yields ``304 Not Modified``.\n\nReturns:\n    A ``Response``\
        \ carrying the feed (``200``) — or an empty ``304`` — with ``ETag`` and\n\
        \    ``Cache-Control`` set."
      operationId: get_mcp_catalog_change_feed_mcp_feed__tenant__get
      parameters:
      - name: tenant
        in: path
        required: true
        schema:
          type: string
          title: Tenant
      - name: format
        in: query
        required: false
        schema:
          type: string
          description: 'Feed format: ''rss'' (default), ''atom'', or ''json'' (JSON
            Feed 1.1).'
          default: rss
          title: Format
        description: 'Feed format: ''rss'' (default), ''atom'', or ''json'' (JSON
          Feed 1.1).'
      - name: If-None-Match
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: If-None-Match
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema: {}
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/browse/tenants/{tenant_slug}/projects/{project_slug}/versions/{version_slug}/export/targets:
    get:
      tags:
      - browse
      summary: List export targets for a published public version (no auth)
      description: For the published public version identified by the slugs, enumerate
        every registered export target (descriptor + capability profile + options)
        with a cheap per-target fidelity badge (tier + preserved-%). The anonymous
        counterpart of ``GET /v1/export/{tenant_slug}/targets``; drives the public
        export dialog's target cards and fidelity warning (MFX-7.1).
      operationId: list_public_export_targets_v1_browse_tenants__tenant_slug__projects__project_slug__versions__version_slug__export_targets_get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: project_slug
        in: path
        required: true
        schema:
          type: string
          title: Project Slug
      - name: version_slug
        in: path
        required: true
        schema:
          type: string
          title: Version Slug
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicExportTargetsResponse'
        '404':
          description: No published public version matches the slugs (private, draft,
            and unknown versions are indistinguishable).
        '429':
          description: Public export rate limit exceeded (MFX-7.3).
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/browse/tenants/{tenant_slug}/projects/{project_slug}/versions/{version_slug}/export/preview:
    post:
      tags:
      - browse
      summary: Preview export fidelity for a published public version (no auth)
      description: Compute the full fidelity report for exporting the published public
        version to one target — the per-construct LossinessReport, the user-facing
        advisory (MFX-2.4), and the tier summary — **without producing the artifact**.
        The anonymous counterpart of ``POST /v1/export/{tenant_slug}/preview``; backs
        the public fidelity advisory (MFX-7.2).
      operationId: preview_public_export_fidelity_v1_browse_tenants__tenant_slug__projects__project_slug__versions__version_slug__export_preview_post
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: project_slug
        in: path
        required: true
        schema:
          type: string
          title: Project Slug
      - name: version_slug
        in: path
        required: true
        schema:
          type: string
          title: Version Slug
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicExportPreviewRequest'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicExportPreviewResponse'
        '404':
          description: No published public version matches the slugs (private, draft,
            and unknown versions are indistinguishable).
        '429':
          description: Public export rate limit exceeded (MFX-7.3).
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/browse/tenants/{tenant_slug}/projects/{project_slug}/versions/{version_slug}/export/document:
    post:
      tags:
      - browse
      summary: Emit the export document for a published public version (no auth)
      description: 'Emit the published public version to one ``target`` through the
        Emitter SPI and return the document itself — JSON by default, YAML when ``Accept:
        application/yaml`` is sent — as a download. The anonymous counterpart of ``POST
        /v1/export/{tenant_slug}/document``. Strictly read-only: no field-identity
        state is persisted for anonymous exports.'
      operationId: emit_public_export_document_v1_browse_tenants__tenant_slug__projects__project_slug__versions__version_slug__export_document_post
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: project_slug
        in: path
        required: true
        schema:
          type: string
          title: Project Slug
      - name: version_slug
        in: path
        required: true
        schema:
          type: string
          title: Version Slug
      - name: accept
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Accept
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PublicExportDocumentRequest'
      responses:
        '200':
          description: Successful Response
        '404':
          description: No published public version matches the slugs (private, draft,
            and unknown versions are indistinguishable).
        '413':
          description: Emitted document exceeds the public download size cap (MFX-7.3).
        '429':
          description: Public export rate limit exceeded (MFX-7.3).
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/data/{tenant_slug}:
    get:
      tags:
      - data
      summary: Data Api Info
      description: Verify data API is mounted and tenant is authenticated. Returns
        200 with tenant_slug.
      operationId: data_api_info_v1_data__tenant_slug__get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Data Api Info V1 Data  Tenant Slug  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/data/{tenant_slug}/records/{record_id}:
    get:
      tags:
      - data
      summary: Get Data Record
      description: 'Get the current snapshot data for a record (for edit form).

        Returns 404 if record not found or deleted.'
      operationId: get_data_record_v1_data__tenant_slug__records__record_id__get
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: record_id
        in: path
        required: true
        schema:
          type: string
          title: Record Id
      - name: class_schema_id
        in: query
        required: true
        schema:
          type: string
          description: Class schema ID
          title: Class Schema Id
        description: Class schema ID
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Get Data Record V1 Data  Tenant Slug  Records  Record
                  Id  Get
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    patch:
      tags:
      - data
      summary: Update Data Record
      description: 'Update an existing data record and data_snapshot.

        Embedding is recomputed asynchronously and stored in data_snapshot.'
      operationId: update_data_record_v1_data__tenant_slug__records__record_id__patch
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: record_id
        in: path
        required: true
        schema:
          type: string
          title: Record Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataRecordUpdateBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Update Data Record V1 Data  Tenant Slug  Records  Record
                  Id  Patch
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    delete:
      tags:
      - data
      summary: Delete Data Record
      description: Delete a data record (append deleted event, remove data_snapshot
        row).
      operationId: delete_data_record_v1_data__tenant_slug__records__record_id__delete
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: record_id
        in: path
        required: true
        schema:
          type: string
          title: Record Id
      - name: class_schema_id
        in: query
        required: true
        schema:
          type: string
          description: Class schema ID
          title: Class Schema Id
        description: Class schema ID
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Delete Data Record V1 Data  Tenant Slug  Records  Record
                  Id  Delete
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/data/{tenant_slug}/records:
    post:
      tags:
      - data
      summary: Create Data Record
      description: 'Create a new data record and data_snapshot row.

        Embedding is computed asynchronously and stored in data_snapshot.'
      operationId: create_data_record_v1_data__tenant_slug__records_post
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DataRecordCreateBody'
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                type: object
                additionalProperties: true
                title: Response Create Data Record V1 Data  Tenant Slug  Records Post
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
  /v1/data/{tenant_slug}/records/{record_id}/restore:
    post:
      tags:
      - data
      summary: Restore Data Record
      description: Restore a deleted data record (recreate data_snapshot from deleted
        event, append restored event).
      operationId: restore_data_record_v1_data__tenant_slug__records__record_id__restore_post
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
      - name: record_id
        in: path
        required: true
        schema:
          type: string
          title: Record Id
      - name: class_schema_id
        in: query
        required: true
        schema:
          type: string
          description: Class schema ID
          title: Class Schema Id
        description: Class schema ID
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
