          - type: 'null'
          title: Current Item
          description: Human hint for the stage (e.g. the target key).
      additionalProperties: false
      type: object
      required:
      - phase
      - total
      - completed
      title: ExportJobProgress
      description: Coarse-grained progress snapshot (mirrors the import job's progress
        shape).
    ExportJobResult:
      properties:
        artifact:
          type: string
          title: Artifact
          description: The artifact (project) id the job exported.
        version_record_id:
          type: string
          title: Version Record Id
          description: The resolved revision (``versions.id``).
        version_label:
          anyOf:
          - type: string
          - type: 'null'
          title: Version Label
          description: The resolved revision's version label (e.g. ``1.0.0``).
        target:
          type: string
          title: Target
          description: The resolved target format key (e.g. ``openapi-3.1``).
        dry_run:
          type: boolean
          title: Dry Run
          description: True when the job stopped after the fidelity report.
        fidelity:
          $ref: '#/components/schemas/ExportFidelity'
          description: The full fidelity envelope (target + tier + report + advisory).
        guard:
          $ref: '#/components/schemas/TranscodeGuard'
          description: 'The pre-flight transcoding guard (MFX-3.3): the conversion
            band and why. A severe conversion only completes when it was submitted
            with ``confirm``.'
        validation:
          anyOf:
          - $ref: '#/components/schemas/EmittedValidationReport'
          - type: 'null'
          description: The emitted-artifact validation gate + report (MFX-5.3). Set
            on a completed real export after the MFX-5.1 re-parse; null for a dry-run
            (no artifact).
        files:
          items:
            $ref: '#/components/schemas/ExportJobFile'
          type: array
          title: Files
          description: Manifest of emitted files; empty for a dry-run.
        media_type:
          anyOf:
          - type: string
          - type: 'null'
          title: Media Type
          description: The bundle's primary media type; null for a dry-run.
        download_path:
          anyOf:
          - type: string
          - type: 'null'
          title: Download Path
          description: Relative URL a poller dereferences to fetch the emitted artifact
            bundle (served by the delivery epics, MFX-4.x). Set once a real export
            completes; null for a dry-run (no artifact was emitted).
        download_expires_at:
          anyOf:
          - type: integer
          - type: 'null'
          title: Download Expires At
          description: Epoch-ms deadline after which the retained artifact is dropped
            and the download route returns 410 (MFX-4.3, temp artifact retention).
            Null for a dry-run (no artifact) or when retention is disabled (retained
            for the process lifetime).
      additionalProperties: false
      type: object
      required:
      - artifact
      - version_record_id
      - target
      - dry_run
      - fidelity
      - guard
      title: ExportJobResult
      description: 'What a terminal ``completed`` export job produced.


        Carries the resolved source coordinates, the resolved target, the full

        :class:`~app.export_fidelity.ExportFidelity` envelope (identical to a ``/export/preview``

        of the same inputs), and — for a real (non-dry-run) export — the emitted file
        manifest.'
    ExportJobStartRequest:
      properties:
        artifact:
          type: string
          title: Artifact
          description: The artifact (project) id to export.
        version:
          anyOf:
          - type: string
          - type: 'null'
          title: Version
          description: Revision UUID, version label (``1.0.0``), or null for the latest
            revision.
        target:
          type: string
          title: Target
          description: Target emitter key (``openapi``) or format key (``openapi-3.1``).
        options:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Options
          description: Per-target emit options (MFX-1.4); null or empty applies the
            target defaults.
        dry_run:
          type: boolean
          title: Dry Run
          description: 'When true, stop after the fidelity report: no artifact is
            emitted.'
          default: false
        confirm:
          type: boolean
          title: Confirm
          description: When true, proceed with a **severe** conversion (MFX-3.3) the
            transcoding guard would otherwise fail the job on. Ignored for non-severe
            conversions and dry-runs.
          default: false
        min_severity:
