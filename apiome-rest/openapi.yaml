  /v1/export/{tenant_slug}/verify:
    post:
      tags:
      - export
      summary: 'One-call pre-generation verify: fidelity + validation + lint + verdict'
      description: 'The Verify workbench''s dry run (MFX-42.5, backing MFX-42.1):
        emit the source artifact/version to one ``target`` in a **temporary buffer**,
        then run fidelity (MFX-2.5) + emitted-output validation (MFX-5.1/5.3) + emitted-artifact
        lint (MFX-5.2) over it, and return all three lenses plus an overall go/no-go
        **verdict** — **without persisting an artifact or a job row**. The emit is
        read-only (no field-identity persistence), so a verify never mutates tenant
        state. The emitted artifact rides back inline under a size cap (``include_content``)
        for the Monaco viewer (MFX-43.x). A severe conversion (MFX-3.3) is **verified,
        not blocked** — its verdict reports the loss so the user can decide. Rate-limited
        by the global per-tenant middleware (it does real emit work). Lint (MFX-5.2)
        is not yet implemented, so ``lint`` is currently ``null``. Typical p50 for
        the five MVP emitters (OpenAPI, AsyncAPI, GraphQL, gRPC/Protobuf, Avro) is
        dominated by the single emit + re-parse and runs in the tens of milliseconds
        for pure-Python validators; protobuf/AsyncAPI add their toolchain''s startup
        when installed.'
