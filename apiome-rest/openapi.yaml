          description: Human-readable reason the target is unavailable, or ``null``
            when available.
      type: object
      required:
      - key
      - format
      - label
      - description
      - icon
      - paradigm
      - multi_file
      - needs_toolchain
      title: EmitterDescriptor
      description: Self-description of an export target for UI/CLI/REST enumeration
        (MFX-1.1).
    ExportAdvisory:
      properties:
        show:
          type: boolean
          title: Show
          description: Whether to surface the advisory at all. ``False`` for a lossless
            export (or one whose losses are all below the requested severity threshold);
            consumers hide their banner when this is ``False``.
          example: false
        severity:
          anyOf:
          - $ref: '#/components/schemas/LossinessSeverity'
          - type: 'null'
            description: Export Advisory schema.
          description: The worst severity among the lossy constructs, driving how
            loudly the surface flags the export. ``None`` for a lossless export.
        requires_ack:
          type: boolean
          title: Requires Ack
          description: Whether the export warrants an explicit dismiss-to-proceed
            acknowledgement — ``True`` only when a ``critical`` construct is lost.
          default: false
          example: false
        target_format:
          type: string
          title: Target Format
          description: Human label for the target format woven into the copy (e.g.
            ``Protobuf``, ``OpenAPI 3.1``).
          example: openapi
        dropped:
          type: integer
          title: Dropped
          description: Number of constructs dropped entirely (LossinessKind.DROP).
          example: 1
        approximated:
          type: integer
          title: Approximated
          description: Number of constructs represented imperfectly (APPROX).
          example: 1
        synthesized:
          type: integer
          title: Synthesized
          description: Number of constructs invented to satisfy the target (SYNTH).
          example: 50
        affected:
          type: integer
          title: Affected
          description: Total constructs changed by the export (``dropped + approximated
            + synthesized``) — the count woven into the message.
          example: 1
        headline:
          type: string
          title: Headline
          description: Short banner heading for the advisory (or the lossless reassurance
            heading when :attr:`show` is ``False``).
          example: example
        message:
          type: string
          title: Message
          description: The full, ready-to-display advisory sentence. Consumers render
            this verbatim — they must not re-template it — so wording is identical
            across UI, browse, and CLI.
          example: Example validation message.
      additionalProperties: false
      type: object
      required:
      - show
      - target_format
      - dropped
      - approximated
      - synthesized
      - affected
      - headline
      - message
      title: ExportAdvisory
      description: "The single user-facing advisory for one cross-format (or lossy)\
        \ export.\n\nBuilt from a :class:`~app.lossiness.LossinessReport` and a human\
        \ target label by\n:func:`build_export_advisory`, then carried verbatim in\
        \ the export / dry-run REST\nresponse (MFX-2.5) so every surface — apiome-ui\
        \ (MFX-6.2), apiome-browse\n(MFX-7.2), apiome-cli (MFX-8.2) — renders identical\
        \ wording.\n\nThe two acceptance criteria of MFX-2.4 are properties of this\
        \ model:\n\n* **reflects real counts** — ``dropped`` / ``approximated`` /\
        \ ``synthesized`` and\n  the ``{constructs}`` woven into ``message`` come\
        \ straight from the report's\n  per-kind counts, so the copy can never drift\
        \ from the loss it describes;\n* **shown when lossy, hidden when lossless**\
        \ — :attr:`show` is ``False`` for a\n  clean export (or one whose only losses\
        \ fall below the caller's severity\n  threshold), and consumers gate their\
        \ banner on it."
    ExportDispatchFile:
      properties:
        path:
          type: string
          title: Path
          description: Relative path within the output bundle.
          example: /resources/{id}
        content:
          title: Content
          description: The emitted file's content (structured document or text).
        media_type:
          anyOf:
          - type: string
            description: Export Dispatch File schema.
          - type: 'null'
            description: Export Dispatch File schema.
          title: Media Type
          description: Per-file media type when it differs from the bundle default.
        subject:
          anyOf:
          - type: string
            description: Export Dispatch File schema.
          - type: 'null'
            description: Export Dispatch File schema.
