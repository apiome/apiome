    get:
      tags:
      - mcp-catalog
      summary: Get Mcp Endpoint Version Lint
      description: 'Return a version snapshot''s lint report — the stored score, or
        a live recompute.


        Serves the report persisted at discovery time (``source="stored"``) when one
        exists; when the

        snapshot has never been scored (or only an empty placeholder row exists),
        the surface is

        reconstructed and scored on the fly (``source="computed"``) without writing
        it back — a GET

