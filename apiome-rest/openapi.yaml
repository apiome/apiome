          title: Tenant Slug
      - name: endpoint_id
        in: path
        required: true
        schema:
          type: string
          format: uuid
          title: Endpoint Id
      - name: authorization
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: Authorization
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
          - type: 'null'
          title: X-Api-Key
      responses:
        '200':
          description: Successful Response
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/McpCredentialStatusResponse'
        '422':
          description: Validation Error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HTTPValidationError'
    put:
      tags:
      - mcp-catalog
      summary: Set Mcp Endpoint Credentials
      description: 'Set or replace an endpoint''s outbound credential, sealing the
        secret before storage.


        The plaintext ``payload`` is validated against its ``auth_type`` (the same
        auth-type model used

        to build request headers, so a malformed or injection-bearing secret is rejected
        here), sealed

        via envelope encryption (MCAT-6.2), and upserted as ciphertext. The response
        is the **redacted**

        status — the secret is never echoed back. Returns ``404`` when the endpoint
        is not the caller''s

        tenant''s, ``422`` when the payload does not match its ``auth_type``, and
        ``503`` when credential

        encryption is not configured (a secret cannot be stored safely without it).'
