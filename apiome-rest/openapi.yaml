    LossItem:
      properties:
        construct:
          type: string
          title: Construct
          description: Stable canonical construct key this item concerns, reused verbatim
            from the CanonicalApi (e.g. ``User.email``, ``acme.PetService.GetPet``,
            ``GET /pets/{id}``). Serialized as ``construct``.
          example: example
        kind:
          $ref: '#/components/schemas/LossinessKind'
          description: 'Representational outcome: drop / approx / synth / ok.'
        severity:
          $ref: '#/components/schemas/LossinessSeverity'
          description: 'How much the loss matters: info / warn / critical.'
        message:
          type: string
          title: Message
          description: Human-readable explanation of what happened to the construct.
          example: Example validation message.
        target_mapping:
          anyOf:
          - type: string
            description: Loss schema.
          - type: 'null'
            description: Loss schema.
          title: Target Mapping
          description: How the construct is represented in the target when not dropped
            (e.g. ``constraint → doc comment``); ``None`` when nothing was emitted
            (a ``DROP``) or nothing needs explaining (a clean ``OK``).
      additionalProperties: false
      type: object
      required:
      - construct
      - kind
      - severity
      - message
      title: LossItem
      description: 'One construct''s fate when exported to a target format.


        ``construct`` reuses the source model''s stable ``key`` (see

        :mod:`app.canonical_model`) so the item lines up by identity with the model
        —

        a diff, a lint finding, and a loss item about ``User.email`` all share the
        key.

        ``target_mapping`` describes *how* the construct landed in the target when
        it

        was not dropped ("numeric range → schema ``description`` note", "synthesized

        field number ``3``"); it is ``None`` for a clean ``OK`` with nothing to explain

        or a ``DROP`` with no target counterpart.


        The construct key is exposed in JSON as ``construct`` (the UI/CLI/REST contract)

        but named ``construct_key`` on the model to (a) match the canonical model''s
        own

        "key" terminology and (b) avoid shadowing :class:`~pydantic.BaseModel`''s

        deprecated ``construct`` method. ``populate_by_name`` lets callers construct
        with

        either name; ``serialize_by_alias`` keeps ``construct`` as the emitted key.'
    LossinessKind:
      type: string
      enum:
      - drop
      - approx
      - synth
      - ok
      title: LossinessKind
      description: 'The representational outcome of one construct when exported to
        a target.


        Orthogonal to :class:`LossinessSeverity` (how much it matters): the same kind

        can be trivial or serious depending on the construct.'
    LossinessReport:
      properties:
        items:
          items:
            $ref: '#/components/schemas/LossItem'
          type: array
          title: Items
          description: The loss items, sorted into a deterministic canonical order.
          maxItems: 100
        kind_counts:
          additionalProperties:
            type: integer
          type: object
          title: Kind Counts
          description: Count of items per LossinessKind, zero-filled for every kind.
            Derived from ``items``; any supplied value is recomputed.
        severity_counts:
          additionalProperties:
            type: integer
          type: object
          title: Severity Counts
          description: Count of items per LossinessSeverity, zero-filled for every
            severity. Derived from ``items``; any supplied value is recomputed.
      additionalProperties: false
      type: object
      title: LossinessReport
      description: "A structured, per-target export lossiness report (MFX-2.1).\n\n\
        Holds the ordered :class:`LossItem` list plus summary counts per\n:class:`LossinessKind`\
        \ and per :class:`LossinessSeverity`. The model is its own\nguarantee of the\
        \ two acceptance criteria that outlive any producer:\n\n* **stable ordering**\
        \ — items are sorted into a fixed canonical order (by\n  construct key, then\
        \ kind, then severity, then message / mapping) on\n  construction *and* on\
        \ re-validation, so however a report is built — via\n  :class:`LossinessReportBuilder`,\
        \ a direct constructor, or ``model_validate``\n  of persisted JSON — the same\
        \ items yield byte-identical JSON;\n\n* **consistent counts** — ``kind_counts``\
        \ and ``severity_counts`` are recomputed\n  from ``items`` on every (re)validation,\
        \ so they can never drift and always\n  carry every enum member zero-filled\
        \ (a stable key set for consumers).\n\nIt is plain Pydantic v2, so it serializes\
        \ to/from JSON losslessly for the REST\nsurfacing (MFX-2.5) and the export-job\
        \ result envelope."
    LossinessSeverity:
      type: string
      enum:
      - info
      - warn
      - critical
      title: LossinessSeverity
      description: 'How much a user should care about a loss, independent of its kind.


        Drives the user-facing advisory thresholds (MFX-2.4) and how loudly the UI
        /

        CLI flag the export: a ``critical`` item warrants a dismiss-to-proceed

        acknowledgement, an ``info`` item a quiet footnote.'
