    ExportFidelity:
      properties:
        target:
          $ref: '#/components/schemas/EmitterDescriptor'
          description: The resolved target emitter's descriptor (key/format/label/paradigm/…).
        summary:
          $ref: '#/components/schemas/TargetFidelity'
          description: The coarse tier / preserved-% summary, matching the /export/targets
