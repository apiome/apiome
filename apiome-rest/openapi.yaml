      - message
      title: ExportJobError
      description: 'Structured terminal error for a ``failed`` export job (MFX-3.4).


        The machine-readable twin of a job''s terminal error event: a poller shows
        ``message``

        and branches on ``code`` (e.g. distinguish ``TRANSCODE_CONFIRMATION_REQUIRED``
        — resubmit

        with ``confirm`` — from ``SOURCE_LOAD_FAILED``) without scraping the free-form
        event log.'
    ExportJobEvent:
      properties:
        id:
          type: string
          title: Id
        ts:
          type: integer
          title: Ts
        level:
          type: string
          enum:
          - info
          - warn
          - error
          title: Level
        code:
          type: string
          title: Code
        message:
          type: string
          title: Message
        context:
          anyOf:
          - additionalProperties: true
            type: object
          - type: 'null'
          title: Context
      additionalProperties: true
      type: object
      required:
      - id
      - ts
      - level
      - code
      - message
      title: ExportJobEvent
      description: Structured log line from an export job (same shape as an import
        job event).
    ExportJobFile:
      properties:
        path:
          type: string
          title: Path
          description: Relative path within the output bundle.
