  /v1/mcp/{tenant_slug}/endpoints/{endpoint_id}/insight/trust:
    get:
      tags:
      - mcp-catalog
      summary: Get Mcp Endpoint Insight Trust
      description: "Return the endpoint's composite trust profile — five normalized\
        \ 0-100 axes (MCAT-17.4).\n\nThe capstone of the single-server insight view:\
        \ a synthesized \"trust glance\" across five axes,\neach reading one already-computed\
        \ metric layer —\n\n* **quality** — the current snapshot's stored lint score;\n\
        * **safety** — behavioural-annotation coverage crossed with the endpoint's\
        \ auth posture and its\n  destructive-tool count;\n* **documentation** — the\
        \ snapshot's documentation coverage;\n* **stability** — the breaking-change\
        \ rate across the evolution series' snapshot transitions;\n* **responsiveness**\
        \ — the test-invocation error rate and p95 latency.\n\nEvery axis whose input\
        \ is missing (a never-scored, never-changed, or never-tested server) is\n\
        returned as an explicit *gap* — ``value: null`` with ``available: false``\
        \ — never a zero, and the\n``overall`` composite averages only the available\
        \ axes. This is deliberately a **heuristic**\ncomposite the panel labels as\
        \ such, not an official rating. A never-discovered endpoint yields an\nall-gap\
        \ profile (a ``200``), never a ``500``. Returns ``404`` when the endpoint\
        \ is not the\ncaller's tenant's. A GET stays read-only."
      operationId: get_mcp_endpoint_insight_trust_v1_mcp__tenant_slug__endpoints__endpoint_id__insight_trust_get
