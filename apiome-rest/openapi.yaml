      description: 'Return the endpoint''s peer percentile & category ranking across
        four axes (MCAT-18.3).


        "Is this a good weather server?" needs a *peer baseline*, not an absolute
        grade. This ranks the

        endpoint against the other live endpoints in its catalog **category** — the
        *cohort* — on four

        axes: **grade** (the stored lint score), **safety** (annotation coverage crossed
        with the

        destructive/auth posture), **documentation** (documentation coverage), and
        **latency** (p95

        responsiveness). Each axis reuses the same derivation the endpoint''s own
        trust profile shows, so a

        rank never disagrees with the numbers on its Insight tab, and each carries
        the server''s percentile

