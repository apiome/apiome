      description: 'One search result — a matched capability item, or a matched endpoint
        (MCAT-9.2).


        Every hit carries its owning endpoint''s browse context (``host``, ``category``,
        quality

        ``score`` / ``grade``, ``visibility``) so a result can be rendered and ranked
        without a second

        lookup. ``kind`` discriminates the two shapes: for a capability hit it is
        the item type

        (``tool`` / ``resource`` / ``resource_template`` / ``prompt``) and the ``item_*``
        fields plus

        ``description`` describe the matched item; for an endpoint hit it is ``endpoint``
        and the

        ``item_*`` fields are ``None`` while ``description`` is the endpoint''s own
        description.

        ``endpoint_url`` is credential-redacted like every other catalog projection,
        and ``relevance``

        is the full-text rank the ordering used.'
