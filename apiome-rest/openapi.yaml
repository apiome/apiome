      description: 'The one-call verify result: fidelity + validation + lint + verdict
        (MFX-42.5).


        Everything the Studio''s Verify workbench (MFX-42.1) needs in one round-trip,
        computed by

        emitting the artifact to a **temporary buffer** — no artifact and no job row
        are persisted.

        The emit is read-only (no field-identity persistence), so a verify never mutates
        tenant state.'
    ExportVerifyVerdict:
      type: string
      enum:
      - clean
      - lossy
      - invalid
