      tags:
      - lint
      summary: Validate Custom Rules
      description: 'Strictly validate a custom-rule style guide (GOV-1.3, #4429).


        Accepts the Spectral-compatible subset DSL: a YAML document with `rules.<id>:

        {description, severity, given, then}` where `then` uses the core functions
        `pattern`,

        `casing`, `enumeration`, `truthy`, `defined`, `undefined`, and `length`. On
        success the

        parsed rules are echoed back (the shape stored in `style_guide_rules.custom_def`).

        A malformed guide returns HTTP 422 whose `detail` carries a `message` and
        a `pointer`

        to the offending definition. Custom rule ids may not shadow built-in rule
        ids.'
