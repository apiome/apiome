  /v1/mcp/{tenant_slug}/endpoints/{endpoint_id}/test:
    post:
      tags:
      - mcp-catalog
      summary: Test Mcp Endpoint Capability
      description: "Invoke one cataloged capability against its live MCP server and\
        \ report the outcome.\n\nThe test-harness surface for the UI/CLI: it names\
        \ a ``tool``/``resource``/``prompt`` on the\nendpoint's *current* discovered\
        \ surface, validates the supplied ``arguments`` against the stored\nschema\
        \ (a tool's ``inputSchema``; a prompt's required arguments), attaches the\
        \ endpoint's stored\ncredential — or an ephemeral ``auth_override`` that is\
        \ **never persisted** — and invokes the one\nmethod under ``timeout_seconds``.\
        \ The response carries the three outcomes the invocation service\ndistinguishes:\
        \ a successful result (``completed`` / not ``is_error``), a tool-level error\n\
        (``completed`` + ``is_error``, with the error content), or a transport/JSON-RPC\
        \ failure\n(``completed=False`` with a classified ``error``) — each with its\
        \ ``latency_ms``.\n\nSafety guards (V2-MCP-22.3 / MCAT-8.3):\n\n* **Confirm\
        \ gate** — a tool whose annotations assert ``destructiveHint`` or ``openWorldHint``\n\
        \  is refused with ``428`` unless the request sets ``confirm=true``, so an\
        \ irreversible or\n  open-world tool is never fired by accident.\n* **Per-endpoint\
        \ rate limit** — accepted calls are throttled per endpoint (``429`` when the\n\
        \  window is exhausted) so the console cannot flood the external server.\n\
        * **Redacted audit log** — every *dispatched* call is recorded in ``mcp_test_invocations``\
        \ with\n  secret-named arguments/response fields masked; auth headers are\
        \ never logged. The new row's id\n  is returned as ``invocation_id``. Logging\
        \ is best-effort and never fails the call.\n\nStatus codes:\n\n* ``404`` —\
        \ the endpoint is not the caller's tenant's, or the named capability is not\
        \ on its\n  current surface.\n* ``409`` — the endpoint has never been discovered\
        \ (no current surface to test).\n* ``422`` — the arguments fail the stored\
        \ schema, the override payload is malformed, or a\n  resource has no concrete\
        \ uri.\n* ``428`` — the tool is flagged destructive/open-world and the request\
        \ did not set ``confirm``.\n* ``429`` — the per-endpoint test rate limit for\
        \ the current window has been reached.\n\nA remote-server failure is **not**\
        \ an HTTP error here: it is reported in-band as\n``completed=False`` with\
        \ the classified ``error``, so \"the tool is down\" is data, not a 5xx."
      operationId: test_mcp_endpoint_capability_v1_mcp__tenant_slug__endpoints__endpoint_id__test_post
      parameters:
      - name: tenant_slug
        in: path
        required: true
        schema:
          type: string
          title: Tenant Slug
          description: Tenant Slug schema.
        description: URL-safe tenant slug that scopes the request.
