          description: Stable registry key, e.g. ``openapi``.
        format:
          type: string
          title: Format
          description: Output format key this emitter produces, e.g. ``openapi-3.1``.
        label:
          type: string
          title: Label
          description: Human label for target cards / CLI listings.
        description:
          type: string
          title: Description
          description: One-line description of what it exports.
        icon:
          type: string
          title: Icon
          description: Icon name (Lucide) the UI renders for this target's card.
        paradigm:
          $ref: '#/components/schemas/ApiParadigm'
          description: The canonical paradigm this emitter primarily targets.
        multi_file:
          type: boolean
          title: Multi File
          description: Whether the emitter produces a multi-file bundle (vs one artifact).
        needs_toolchain:
          type: boolean
          title: Needs Toolchain
