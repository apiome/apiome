          description: The emitted-artifact lint report (MFX-5.2); null until MFX-5.2
            lands, which the Verify workbench renders as the lint lens's empty state.
        verdict:
          $ref: '#/components/schemas/ExportVerifyVerdict'
          description: The overall go/no-go band the Generate gate reads (clean /
            lossy / invalid).
        files:
          items:
