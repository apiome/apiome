  /v1/catalog/{tenant_slug}/{item_id}/convert:
    post:
      tags:
      - catalog
      summary: Convert Catalog Item
      description: "Convert a catalog item to OpenAPI — a dry-run preview or a committed\
        \ Project (MFI-22.6).\n\nThe single convert verb behind the UI preview (MFI-22.4),\
        \ CLI (``apiome convert``), and API:\n\n* ``dryRun=true`` (the default) reconstructs\
        \ the item's canonical model from its captured source,\n  emits the OpenAPI\
        \ 3.1 document (MFI-22.1) and analyzes its fidelity (MFI-22.3), and returns\
        \ the\n  **fidelity report + the would-be document with no side effects**\
        \ — nothing is created.\n* ``dryRun=false`` runs the convert-to-project/version\
        \ commit job (MFI-22.5): it mints a new\n  Project + ``v1`` (or appends a\
        \ new version to the previously-converted Project on a re-convert),\n  captures\
        \ its lint score, persists provenance, and returns the created ids + the report.\n\
        \nThe ``dryRun`` **query param is authoritative** for the side-effect decision\
        \ (falling back to the\nbody's ``dryRun``), so a malformed/omitted body defaults\
        \ to a safe dry-run and never silently\ncommits. ``target`` is ``openapi``\
        \ today; other targets yield 400 (the verb is target-generic for\nfuture emitters).\
        \ Optional ``defaults`` (info title/version, servers) fill cheap gaps only\
        \ where\nthe source is empty.\n\nA catalog item's id is a project id; this\
        \ is restricted to the non-publishable slice, so a\nProject's id — or an unknown\
        \ id — yields 404. An item with no captured source material to\nreconstruct\
        \ from yields 422. Authenticated via JWT token or API key.\n\nArgs:\n    tenant_slug:\
        \ The tenant slug (used to reconstruct/commit the OpenAPI document).\n   \
        \ item_id: The catalog item ID (a project id).\n    request: The conversion\
        \ target + dryRun + optional defaults.\n    dry_run: Authoritative dryRun\
        \ query override (``None`` falls back to the body).\n    auth_data: Authentication\
        \ data (injected by dependency).\n\nReturns:\n    A :class:`ConvertDryRunResponse`\
        \ for a dry-run, or a :class:`ConvertCommitResponse` for a commit."
      operationId: convert_catalog_item_v1_catalog__tenant_slug___item_id__convert_post
      parameters:
