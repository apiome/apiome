          example: version_01h2xcejqtf3fz5y5j0v8k9m2p
        version_label:
          anyOf:
          - type: string
            description: Response payload for export dispatch.
          - type: 'null'
            description: Response payload for export dispatch.
          title: Version Label
          description: The resolved revision's version label (e.g. ``1.0.0``).
        target:
          type: string
          title: Target
          description: The resolved target format key (e.g. ``openapi-3.1``).
