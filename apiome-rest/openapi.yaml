        (with a fixed

        mask placeholder when it is), the sealing ``key_version``, non-secret ``oauth_metadata``
        and

        timestamps. An endpoint with no credential reads as the anonymous ``none``
        status. 404 when the

        endpoint is not the caller''s tenant''s.'
