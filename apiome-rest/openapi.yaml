          Bearer <token>``).'
      - name: X-API-Key
        in: header
        required: false
        schema:
          anyOf:
          - type: string
            description: Validate Custom Rules Xapikey schema.
          - type: 'null'
            description: Validate Custom Rules Xapikey schema.
          title: X-Api-Key
          description: X-Api-Key schema.
        description: Tenant-scoped API key used as an alternative to JWT bearer authentication.
      requestBody:
