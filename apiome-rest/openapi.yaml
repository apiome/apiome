      title: McpEndpointDigestResponse
      description: "The \"changed since last view\" digest for one user + endpoint\
        \ (V2-MCP-30.5 / MCAT-16.5).\n\nSummarizes what changed on the endpoint's\
        \ surface between the version the user *last saw*\n(their ``mcp_endpoint_views``\
        \ seen-marker) and its *current* version, and how breaking that\nchange is:\n\
        \n* ``new_to_you`` — the user has no recorded marker (first visit), or the\
        \ version they last saw\n  has since been pruned (a ``NULL`` pointer). There\
        \ is no \"since\" point to diff from, so\n  ``changes`` is empty and ``current_type_counts``\
        \ describes the surface they are seeing fresh.\n* ``has_changes`` — a marker\
        \ exists and points at an older snapshot than the current one, so\n  ``changes``\
        \ / ``change_counts`` / ``severity_counts`` describe the delta since it.\n\
        * Neither flag set — the user has already seen the current version; the endpoint\
        \ is up to date.\n\nReading the digest does **not** advance the marker; a\
        \ separate view-record call\n(``POST …/views``) does, so the digest reflects\
        \ the pre-advance state on load."
