      - version_record_id
      - fidelity
      - guard
      title: ExportPreviewResponse
      description: 'The dry-run fidelity preview: the full envelope + the resolved
        source coordinates (MFX-2.5).'
    ExportTargetFidelity:
      properties:
        descriptor:
          $ref: '#/components/schemas/EmitterDescriptor'
        capability_profile:
          $ref: '#/components/schemas/CapabilityProfile'
        options_schema:
          additionalProperties: true
          type: object
          title: Options Schema
          description: JSON Schema for this target's per-emit options (MFX-1.4).
        default_options:
          additionalProperties: true
          type: object
          title: Default Options
          description: Validated default option values for this target (MFX-1.4).
        fidelity:
