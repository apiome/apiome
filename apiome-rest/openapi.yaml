      description: 'Return the endpoint''s discovery and test-invocation reliability
        aggregates + health timeline.


        ``discovery`` folds ``mcp_discovery_jobs`` into per-state tallies, a success
        rate over terminal

        jobs, and run-latency statistics; ``invocation`` folds ``mcp_test_invocations``
