# Sample Objectified CLI configuration (TOML).
#
# Copy to your real config path (see `objectified config path`) or use:
#   objectified --config /path/to/this/file.toml …
#   OBJECTIFIED_CONFIG=/path/to/this/file.toml
#
# API key precedence (highest wins): --api-key → OBJECTIFIED_API_KEY → --api-key-file
#   → api_key here ([profile.NAME] over [default]) → key from `objectified auth login --api-key`.
# Plain-text api_key in this file is convenient for CI or personal machines; on shared systems
# prefer env vars or `auth login` (keychain / encrypted vault). OAuth still requires auth login.
# Details: `objectified docs profiles`

# Profile used when --profile and OBJECTIFIED_PROFILE are unset.
default_profile = "default"

# Values merged under every named profile unless overridden in [profile.NAME].
[default]
base_url = "https://api.objectified.dev"
# tenant_slug = "your-tenant-slug"
# Optional fallback API key when no flag/env/file/stored key applies:
# api_key = "sk_live_…"

[profile.default]
# Overrides [default] for the "default" profile only (often matches [default]).
base_url = "https://api.objectified.dev"

# Example second profile (switch with --profile staging or OBJECTIFIED_PROFILE=staging).
[profile.staging]
base_url = "https://api.staging.example.com"
tenant_slug = "acme-staging"
# Per-profile API key (overrides [default] api_key for this profile only):
# api_key = "sk_test_…"
