"""
Schema demonstrating input types for mutations
"""

"""
Input for creating a new user
"""
input CreateUserInput {
  "User's display name"
  name: String!

  "User's email address"
  email: String!

  "User's password (will be hashed)"
  password: String!

  "Optional profile information"
  profile: ProfileInput
}

"""
Input for updating a user
"""
input UpdateUserInput {
  name: String
  email: String
  profile: ProfileInput
}

"""
User profile information
"""
input ProfileInput {
  bio: String
  avatar: String
  website: String
  location: String
  birthday: String
}

"""
Input for creating an address
"""
input AddressInput {
  street: String!
  city: String!
  state: String!
  postalCode: String!
  country: String!
}

"""
Pagination input
"""
input PaginationInput {
  page: Int = 1
  pageSize: Int = 20
  sortBy: String
  sortOrder: SortOrder = ASC
}

"""
Sort order
"""
enum SortOrder {
  ASC
  DESC
}

"""
Filter input for searching
"""
input UserFilterInput {
  nameContains: String
  emailContains: String
  isActive: Boolean
  createdAfter: String
  createdBefore: String
}

type User {
  id: ID!
  name: String!
  email: String!
  profile: Profile
}

type Profile {
  bio: String
  avatar: String
  website: String
  location: String
  birthday: String
}

type Query {
  users(filter: UserFilterInput, pagination: PaginationInput): [User!]!
}

type Mutation {
  createUser(input: CreateUserInput!): User!
  updateUser(id: ID!, input: UpdateUserInput!): User!
  deleteUser(id: ID!): Boolean!
}

