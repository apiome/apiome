version: '3.8'

services:
  apiome-web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apiome-web
    ports:
      - "3002:3002"
    environment:
      # Base path configuration (if needed)
      - NEXT_PUBLIC_BASE_PATH=${NEXT_PUBLIC_BASE_PATH:-}
      # External URLs
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL:-https://app.apiome.app}
      - NEXT_PUBLIC_BROWSE_URL=${NEXT_PUBLIC_BROWSE_URL:-https://browse.apiome.app}
      - NEXT_PUBLIC_DOCS_URL=${NEXT_PUBLIC_DOCS_URL:-https://docs.apiome.app}
    restart: unless-stopped
    networks:
      - apiome-network

networks:
  apiome-network:
    driver: bridge
