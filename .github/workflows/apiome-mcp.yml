name: Apiome MCP

on:
  push:
    branches: [ main, develop ]
    paths:
      - '.github/workflows/apiome-mcp.yml'
      - 'apiome-mcp/**'
      - 'apiome-rest/**'
      - 'docker-compose.yml'
      - 'docker-compose.env.example'
      - 'apiome-db/**'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '.github/workflows/apiome-mcp.yml'
      - 'apiome-mcp/**'
      - 'apiome-rest/**'
      - 'docker-compose.yml'
      - 'docker-compose.env.example'
      - 'apiome-db/**'
  workflow_dispatch:

jobs:
  test:
    name: Lint, type-check and test apiome-mcp
    runs-on: self-hosted

    # PostgreSQL is started manually (see "Start PostgreSQL" below) instead of via
    # a `services:` block. A service maps to a fixed host port, and on this shared
    # self-hosted runner two concurrent runs binding the same host port collide
    # ("port is already allocated"). Instead we bind a randomly chosen free port
    # per run and tear the container down in an always() step.
    env:
      POSTGRES_DB: apiome_ci
      POSTGRES_HOST: localhost
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      # Unique per run+attempt so parallel/retried jobs never share a container name.
      PG_CONTAINER: apiome-mcp-pg-${{ github.run_id }}-${{ github.run_attempt }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Start PostgreSQL on a random free port
        run: |
          set -euo pipefail

          pick_free_port() {
            if command -v python3 >/dev/null 2>&1; then
              python3 -c 'import socket; s=socket.socket(); s.bind(("", 0)); print(s.getsockname()[1]); s.close()'
            else
              while :; do
                p=$(( (RANDOM % 20000) + 20000 ))
                if ! (exec 3<>/dev/tcp/127.0.0.1/"$p") 2>/dev/null; then
                  echo "$p"; return
                fi
              done
            fi
          }

          started=""
          for attempt in $(seq 1 10); do
            port="$(pick_free_port)"
            echo "Attempt ${attempt}: starting postgres on host port ${port}"
            if docker run -d \
                --name "$PG_CONTAINER" \
                -e POSTGRES_DB="$POSTGRES_DB" \
                -e POSTGRES_USER="$POSTGRES_USER" \
                -e POSTGRES_PASSWORD="$POSTGRES_PASSWORD" \
                -p "${port}:5432" \
                --health-cmd "pg_isready -U postgres -d $POSTGRES_DB" \
                --health-interval 10s \
                --health-timeout 5s \
                --health-retries 5 \
                postgres:16 >/dev/null 2>docker-run.err; then
              echo "POSTGRES_PORT=${port}" >> "$GITHUB_ENV"
              echo "APIOME_MCP_DATABASE_URL=postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@${POSTGRES_HOST}:${port}/${POSTGRES_DB}" >> "$GITHUB_ENV"
              echo "Started container ${PG_CONTAINER} on host port ${port}"
              started="yes"
              break
            fi
            echo "Could not bind port ${port}:"; cat docker-run.err || true
            docker rm -f "$PG_CONTAINER" >/dev/null 2>&1 || true
            sleep 1
          done

          if [ -z "$started" ]; then
            echo "Failed to start PostgreSQL on a free port after 10 attempts" >&2
            exit 1
          fi

      - name: Wait for PostgreSQL to be healthy
        run: |
          set -euo pipefail
          for i in $(seq 1 30); do
            status="$(docker inspect --format '{{.State.Health.Status}}' "$PG_CONTAINER" 2>/dev/null || echo unknown)"
            echo "Health check ${i}: ${status}"
            if [ "$status" = "healthy" ]; then
              exit 0
            fi
            sleep 2
          done
          echo "PostgreSQL did not become healthy in time" >&2
          docker logs "$PG_CONTAINER" || true
          exit 1

      - name: Validate Docker Compose specification
        run: docker compose config

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync --frozen
        working-directory: apiome-mcp

      - name: Ruff lint
        run: uv run ruff check .
        working-directory: apiome-mcp

      - name: Ruff format check
        run: uv run ruff format --check .
        working-directory: apiome-mcp

      - name: Mypy type check
        run: uv run mypy -p apiome_mcp
        working-directory: apiome-mcp

      - name: Run pytest
        run: uv run pytest
        working-directory: apiome-mcp

      - name: Stop PostgreSQL
        if: always()
        run: |
          docker rm -f "$PG_CONTAINER" >/dev/null 2>&1 || true

  publish-docker-image:
    name: Build and push apiome-mcp image
    needs: test
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    runs-on: self-hosted
    env:
      DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}
      IMAGE_NAME: apiome-mcp

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read package version
        id: meta
        working-directory: apiome-mcp
        run: |
          set -euo pipefail
          version=$(grep -E '^version\s*=' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
          driver: docker

      - name: Log in to Docker registry
        run: echo "$DOCKER_PASSWORD" | docker login "$DOCKER_REGISTRY" -u "$DOCKER_USERNAME" --password-stdin

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: apiome-mcp/Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Push Docker image
        run: |
          chmod +x .github/scripts/docker-push-with-retry.sh
          .github/scripts/docker-push-with-retry.sh \
            "${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}" \
            "${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            "${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
