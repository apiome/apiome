name: Apiome REST

on:
  push:
    branches: [ main ]
    paths:
      - 'apiome-rest/**'
  workflow_dispatch:

env:
  IMAGE_NAME: apiome-rest

jobs:
  build-and-push:
    name: Build and push apiome-rest image
    runs-on: self-hosted
    env:
      DOCKER_REGISTRY: ${{ secrets.DOCKER_REGISTRY }}
      DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
      DOCKER_PASSWORD: ${{ secrets.DOCKER_PASSWORD }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read package version
        id: meta
        working-directory: apiome-rest
        run: |
          set -euo pipefail
          version=$(grep -E '^version\s*=' pyproject.toml | head -1 | sed -E 's/.*"([^"]+)".*/\1/')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
        with:
          version: latest
          driver: docker

      - name: Log in to Docker registry
        run: echo "$DOCKER_PASSWORD" | docker login "$DOCKER_REGISTRY" -u "$DOCKER_USERNAME" --password-stdin

      - name: Build Docker image
        uses: docker/build-push-action@v6
        with:
          # Repo-root context: the Dockerfile bundles the apiome-ui workspace (tsx
          # spec-import worker) alongside the Python app.
          context: .
          file: apiome-rest/Dockerfile
          push: false
          load: true
          platforms: linux/amd64
          provenance: false
          sbom: false
          tags: |
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest
            ${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Push Docker image
        run: |
          chmod +x .github/scripts/docker-push-with-retry.sh
          .github/scripts/docker-push-with-retry.sh \
            "${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ steps.meta.outputs.version }}" \
            "${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:latest" \
            "${{ env.DOCKER_REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}"
