name: OLO Journey (MVP gate)

# End-to-end journey test for the OAuth Login & Onboarding MVP (OLO-7.4, #4226) —
# the acceptance gate for roadmap #4184. Brings up the spine (postgres -> migrate
# -> rest) via the root docker-compose, then runs:
#   1. the Playwright journey (apiome-ui/e2e/journey) — real UI + REST + Postgres
#      with all three OAuth providers mocked: per-provider login, account-resolution
#      invariants (auto-link / no-duplicate / unverified rejected), zero-tenant
#      onboarding wizard, Free-license issue + seat limit, tenant switcher;
#   2. the REST-side journey pytest twin (apiome-rest/tests/test_journey_olo.py).
# Intended to be a REQUIRED status check on `main`: red means the MVP journey regressed.

on:
  push:
    branches: [ main, develop ]
    paths:
      - '.github/workflows/e2e-journey.yml'
      - 'docker-compose.yml'
      - 'docker-compose.env.example'
      - 'apiome-ui/**'
      - 'apiome-rest/**'
      - 'apiome-db/**'
      - 'package.json'
      - 'yarn.lock'
  pull_request:
    branches: [ main, develop ]
    paths:
      - '.github/workflows/e2e-journey.yml'
      - 'docker-compose.yml'
      - 'docker-compose.env.example'
      - 'apiome-ui/**'
      - 'apiome-rest/**'
      - 'apiome-db/**'
      - 'package.json'
      - 'yarn.lock'
  workflow_dispatch:

jobs:
  journey:
    name: OLO end-to-end journey
    runs-on: self-hosted

    env:
      # Matches the root docker-compose defaults (docker-compose.env.example).
      DATABASE_URL: postgresql://postgres:apiome_local_dev@localhost:5432/apiome
      NEXT_PUBLIC_REST_API_BASE_URL: http://localhost:8000/v1
      NEXTAUTH_SECRET: olo-journey-ci-secret
      NEXT_TELEMETRY_DISABLED: "1"

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Bring up the spine (postgres -> migrate -> rest)
        run: docker compose up --build --wait postgres migrate rest

      - name: Enable Corepack and set Yarn to 4.12.0
        run: corepack enable && corepack prepare yarn@4.12.0 --activate

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Install Apiome UI dependencies
        run: yarn install
        working-directory: apiome-ui

      - name: Install Playwright Chromium
        run: yarn playwright install chromium
        working-directory: apiome-ui

      - name: Run the Playwright journey
        run: yarn test:e2e:journey
        working-directory: apiome-ui
        env:
          CI: "1"

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install apiome-rest dependencies
        run: uv sync
        working-directory: apiome-rest

      - name: Run the REST journey suite
        run: uv run pytest tests/test_journey_olo.py -q
        working-directory: apiome-rest

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: olo-journey-playwright-report
          path: |
            apiome-ui/playwright-report-journey/
            apiome-ui/test-results/
          if-no-files-found: ignore
        continue-on-error: true

      - name: Dump stack logs on failure
        if: failure()
        run: docker compose logs --no-color > docker-compose.logs.txt 2>&1 || true

      - name: Upload stack logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: olo-journey-stack-logs
          path: docker-compose.logs.txt
          if-no-files-found: ignore
        continue-on-error: true

      - name: Tear down
        if: always()
        run: docker compose down -v
